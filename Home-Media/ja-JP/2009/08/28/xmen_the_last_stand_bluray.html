<!DOCTYPE html>
<html lang="ja-JP">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-MEN：ファイナル ディシジョン (Blu-ray) - 20世紀フォックス ホーム エンターテイメント ジャパン</title>
    <style>
        :root {
            --x-blue: #003366;
            --x-silver: #c0c0c0;
            --accent: #ffcc00;
        }

        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 900px;
            background: linear-gradient(145deg, #1a1a1a, #000);
            border: 1px solid #333;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 0 30px rgba(0, 51, 102, 0.5);
            text-align: center;
        }

        .header h1 {
            font-size: 2rem;
            letter-spacing: 2px;
            border-bottom: 2px solid var(--x-blue);
            padding-bottom: 10px;
            margin-bottom: 25px;
        }

        .jacket-gallery {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        .jacket-gallery img {
            width: 280px;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.8);
            transition: transform 0.3s ease, border 0.3s ease;
            border: 2px solid transparent;
            cursor: pointer;
        }

        .jacket-gallery img:hover {
            transform: scale(1.05);
            border-color: var(--x-blue);
        }

        .info-panel {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 10px;
            text-align: left;
            display: inline-block;
            margin-top: 10px;
        }

        .info-item {
            margin: 10px 0;
            font-size: 1.1rem;
        }

        .label {
            color: var(--x-silver);
            font-weight: bold;
            margin-right: 10px;
        }

        .highlight {
            color: var(--accent);
        }

        button {
            margin-top: 20px;
            padding: 12px 30px;
            background-color: var(--x-blue);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #004d99;
        }

        @media (max-width: 600px) {
            .jacket-gallery img { width: 100%; }
        }
    </style>
</head>
<body>

<div class="container">
    <header class="header">
        <h1>X-MEN：ファイナル ディシジョン</h1>
    </header>

    <div class="jacket-gallery">
        <img id="frontJacket" src="https://images.static-bluray.com/movies/covers/85555_slip.jpg" alt="Front Cover">
        <img id="backJacket" src="https://images.static-bluray.com/movies/covers/85555_slipback.jpg" alt="Back Cover">
    </div>

    <div class="info-panel">
        <div class="info-item"><span class="label">フォーマット</span>： Blu-ray (2枚組)</div>
        <div class="info-item"><span class="label">発売日</span>： 2009/08/28</div>
        <div class="info-item"><span class="label">販売元</span>： 20世紀フォックス ホーム エンターテイメント ジャパン</div>
        <div class="info-item"><span class="label">ステータス</span>： <span class="highlight">ULTIMATE EDITION</span></div>
    </div>

    <div>
        <button onclick="toggleView()">ジャケットを切り替え</button>
    </div>
</div>

<script>
    function toggleView() {
        const front = document.getElementById('frontJacket');
        const back = document.getElementById('backJacket');
        
        // シンプルなフェード効果のシミュレーション
        if (front.style.order === "1") {
            front.style.order = "0";
            back.style.order = "1";
        } else {
            front.style.order = "1";
            back.style.order = "0";
        }
    }
</script>

</body>
</html>
