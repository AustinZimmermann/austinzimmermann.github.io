<!DOCTYPE html>
<html lang="ja-JP">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【Blu-ray】 X-MEN ＜2枚組＞ - 20世紀フォックス ホーム エンターテイメント</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #161f33;
            --accent-color: #00d2ff;
            --text-main: #ffffff;
            --text-muted: #8fa0c0;
            --border-color: #233554;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            line-height: 1.6;
            padding: 40px 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-color);
            overflow: hidden;
            display: grid;
            grid-template-columns: 1fr;
        }

        @media (min-width: 768px) {
            .container {
                grid-template-columns: 400px 1fr;
            }
        }

        .media-aside {
            background: #070a12;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-right: 1px solid var(--border-color);
        }

        .cover-art {
            max-width: 100%;
            height: auto;
            border-radius: 6px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
            transition: transform 0.3s ease;
        }

        .cover-art:hover {
            transform: scale(1.02);
        }

        .format-badge {
            margin-top: 20px;
            background: linear-gradient(135deg, #0072ff, #00d2ff);
            color: #fff;
            padding: 6px 20px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .content-main {
            padding: 40px;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 5px;
            color: var(--text-main);
            font-weight: 700;
        }

        .publisher {
            color: var(--accent-color);
            font-size: 1rem;
            margin-bottom: 25px;
            font-weight: 600;
        }

        .info-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 30px;
        }

        .info-table th, .info-table td {
            padding: 12px 0;
            border-bottom: 1px solid var(--border-color);
            text-align: left;
        }

        .info-table th {
            color: var(--text-muted);
            font-weight: 500;
            width: 30%;
            font-size: 0.95rem;
        }

        .info-table td {
            color: var(--text-main);
            font-size: 0.95rem;
        }

        .synopsis {
            background: rgba(255, 255, 255, 0.03);
            padding: 20px;
            border-left: 4px solid var(--accent-color);
            border-radius: 0 8px 8px 0;
        }

        .synopsis h3 {
            margin-bottom: 10px;
            color: var(--text-main);
            font-size: 1.1rem;
        }

        .synopsis p {
            color: var(--text-muted);
            font-size: 0.9rem;
            textAlign: left;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="media-aside">
        <img id="product-image" src="" alt="X-MEN Blu-ray Cover" class="cover-art">
        <span id="product-discs" class="format-badge"></span>
    </div>

    <div class="content-main">
        <h1 id="product-title"></h1>
        <div id="product-publisher" class="publisher"></div>

        <table class="info-table">
            <tr>
                <th>発売日</th>
                <td id="product-release"></td>
            </tr>
            <tr>
                <th>品番</th>
                <td id="product-catalog"></td>
            </tr>
            <tr>
                <th>画面サイズ</th>
                <td id="product-aspect"></td>
            </tr>
            <tr>
                <th>音声</th>
                <td id="product-audio"></td>
            </tr>
            <tr>
                <th>字幕</th>
                <td id="product-subtitles"></td>
            </tr>
        </table>

        <div class="synopsis">
            <h3>ストーリー</h3>
            <p id="product-synopsis"></p>
        </div>
    </div>
</div>

<script>
    // Embedded data.json simulated object
    const jsonData = {
        "title": "X-MEN ＜2枚組＞",
        "format": "Blu-ray",
        "discs": "2枚組 (2-Disc Set)",
        "publisher": "20世紀フォックス ホーム エンターテイメント",
        "release_date": "2009-08-28",
        "catalog_number": "FXXG-19942",
        "image_url": "https://images.static-bluray.com/movies/covers/85558_slip.jpg",
        "specifications": {
            "aspect_ratio": "1080p High Definition / 2.35:1 シネマスコープ",
            "audio": "英語 DTS-HD マスター・オーディオ 5.1ch, 英語 ドルビーデジタル 5.1ch, 日本語 DTS 5.1ch",
            "subtitles": "日本語, 英語"
        },
        "synopsis": "遺伝子の突然変異により、超人類的超能力を身につけたミュータント「X-MEN」。人類に忌み嫌われながらも、地球の平和を守るために果てしない闘いへと突入していく。圧倒的なビジュアルSFXで描く大ヒットSFアクションシリーズの第1作。"
    };

    // JavaScript to populate the elements dynamically using the JSON data
    document.getElementById('product-title').textContent = jsonData.title;
    document.getElementById('product-publisher').textContent = jsonData.publisher;
    document.getElementById('product-discs').textContent = jsonData.discs;
    document.getElementById('product-release').textContent = jsonData.release_date;
    document.getElementById('product-catalog').textContent = jsonData.catalog_number;
    document.getElementById('product-aspect').textContent = jsonData.specifications.aspect_ratio;
    document.getElementById('product-audio').textContent = jsonData.specifications.audio;
    document.getElementById('product-subtitles').textContent = jsonData.specifications.subtitles;
    document.getElementById('product-synopsis').textContent = jsonData.synopsis;
    
    // Set the image src
    const imgElement = document.getElementById('product-image');
    imgElement.src = jsonData.image_url;
</script>

</body>
</html>
