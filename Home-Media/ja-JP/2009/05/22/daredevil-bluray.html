<!DOCTYPE html>
<html lang="ja-JP">
<head>
    <meta charset="UTF-8">
    <title>デアデビル ディレクターズ・カット [ブルーレイ] | 20th Century Fox Japan</title>
    <style>
        /* 2009 Era Dark/Grungy Entertainment Web Aesthetic */
        body {
            background-color: #0c0d12;
            background-image: linear-gradient(to bottom, #161922 0%, #0c0d12 400px);
            color: #d1d5db;
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            margin: 0;
            padding: 0;
            font-size: 13px;
            line-height: 1.6;
        }

        #wrapper {
            width: 960px;
            margin: 0 auto;
            background: rgba(0, 0, 0, 0.6);
            border-left: 1px solid #222530;
            border-right: 1px solid #222530;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        /* Fox Header */
        header {
            background-color: #000;
            border-bottom: 3px solid #b11c1c; /* Daredevil Red Accent */
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .fox-logo {
            color: #fff;
            font-weight: 900;
            font-size: 20px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .fox-logo span {
            color: #b11c1c;
        }

        nav a {
            color: #9ca3af;
            text-decoration: none;
            margin-left: 15px;
            font-size: 11px;
            text-transform: uppercase;
        }

        nav a:hover, nav a.active {
            color: #fff;
        }

        /* Main Content Layout */
        .content-container {
            display: flex;
            padding: 40px 30px;
            gap: 40px;
        }

        .product-artwork {
            flex: 0 0 300px;
        }

        .product-artwork img {
            width: 100%;
            border-radius: 4px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.9), 0 0 0 1px rgba(255,255,255,0.1);
        }

        .product-details {
            flex: 1;
        }

        .release-date-badge {
            background-color: #b11c1c;
            color: #fff;
            display: inline-block;
            padding: 3px 8px;
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 10px;
            border-radius: 2px;
            letter-spacing: 1px;
        }

        h1 {
            margin: 0 0 5px 0;
            font-size: 28px;
            color: #fff;
            font-weight: 700;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .sub-title {
            margin: 0 0 20px 0;
            font-size: 16px;
            color: #9ca3af;
        }

        .synopsis {
            border-top: 1px solid #222530;
            border-bottom: 1px solid #222530;
            padding: 20px 0;
            margin-bottom: 25px;
            color: #e5e7eb;
        }

        /* Tab Navigation for Specs/Special Features */
        .tabs {
            display: flex;
            border-bottom: 2px solid #222530;
            margin-bottom: 15px;
        }

        .tab-button {
            background: none;
            border: none;
            color: #9ca3af;
            padding: 10px 20px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            transition: all 0.2s;
        }

        .tab-button:hover {
            color: #fff;
        }

        .tab-button.active {
            color: #b11c1c;
            border-bottom: 2px solid #b11c1c;
            margin-bottom: -2px;
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .tab-content.active {
            display: block;
        }

        /* Data Tables */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th, td {
            padding: 8px 12px;
            text-align: left;
            border-bottom: 1px solid #181a24;
        }

        th {
            color: #9ca3af;
            font-weight: normal;
            width: 30%;
            font-size: 12px;
        }

        td {
            color: #fff;
        }

        .features-list {
            padding-left: 20px;
            margin: 10px 0;
        }

        .features-list li {
            margin-bottom: 8px;
            color: #e5e7eb;
        }

        /* Footer */
        footer {
            background-color: #06070a;
            padding: 30px;
            text-align: center;
            font-size: 11px;
            color: #4b5563;
            border-top: 1px solid #11131a;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

<div id="wrapper">
    <header>
        <div class="fox-logo">20th<span>Fox</span> Home Ent.</div>
        <nav>
            <a href="#">ホーム</a>
            <a href="#" class="active">ブルーレイ＆DVD</a>
            <a href="#">近日発売</a>
            <a href="#">サポート</a>
        </nav>
    </header>

    <div class="content-container">
        <div class="product-artwork">
            <img src="https://images.static-bluray.com/movies/covers/84908_front.jpg" alt="デアデビル ディレクターズ・カット ブルーレイ ジャケット">
        </div>

        <div class="product-details">
            <div class="release-date-badge" id="release-badge">LOADING...</div>
            <h1 id="movie-title">-------</h1>
            <div class="sub-title" id="movie-subtitle">-------</div>

            <div class="synopsis" id="movie-synopsis">
                </div>

            <div class="tabs">
                <button class="tab-button active" onclick="switchTab(event, 'specs')">ディスク仕様</button>
                <button class="tab-button" onclick="switchTab(event, 'features')">特典映像</button>
            </div>

            <div id="specs" class="tab-content active">
                <table>
                    <tr>
                        <th>音声</th>
                        <td id="spec-audio">-------</td>
                    </tr>
                    <tr>
                        <th>字幕</th>
                        <td id="spec-subtitles">-------</td>
                    </tr>
                    <tr>
                        <th>画面サイズ</th>
                        <td id="spec-aspect">-------</td>
                    </tr>
                    <tr>
                        <th>収録時間</th>
                        <td id="spec-runtime">-------</td>
                    </tr>
                </table>
            </div>

            <div id="features" class="tab-content">
                <ul class="features-list" id="special-features-list">
                    </ul>
            </div>
        </div>
    </div>

    <footer>
        <p>※発売日、特典内容、ジャケットデザイン及び仕様は変更になる場合がございます。</p>
        <p>&copy; 2009 Twentieth Century Fox Home Entertainment LLC. All Rights Reserved.</p>
    </footer>
</div>

<script type="application/json" id="product-data">
{
    "productId": "FXXA-29051",
    "title": "デアデビル ディレクターズ・カット",
    "subtitle": "Daredevil: Director’s Cut (Blu-ray)",
    "releaseDateFormatted": "2009年5月22日発売",
    "synopsis": "盲目となった少年マット・マードックは、超人的な五感（レーダーセンス）を手に入れる。大人になった彼は昼は弁護士、夜は法の網を潜り抜ける悪を裁く正義の復讐者『デアデビル』として、巨大犯罪組織に立ち向かう！劇場公開版より30分の未公開シーンを追加した究極のディレクターズ・カット版が遂にブルーレイで登場。",
    "specs": {
        "audio": "英語 5.1ch DTS-HD マスター・オーディオ, 日本語 5.1ch DTS",
        "subtitles": "日本語, 英語",
        "aspectRatio": "1080p Hi-Def / スコープサイズ (2.35:1)",
        "runtime": "約133分"
    },
    "specialFeatures": [
        "マーク・スティーヴン・ジョンソン監督による音声解説",
        "製作の舞台裏：『デアデビル』の軌跡",
        "『マン・ウィズアウト・フィアー』：原作コミックの歴史",
        "シャドウ・ワールド：視覚効果の解説",
        "ミュージック・ビデオ集 (Evanescence, Nickelback他)",
        "オリジナル劇場予告編集"
    ]
}
</script>

<script>
    // Load and Parse the Embedded JSON Data
    document.addEventListener("DOMContentLoaded", function() {
        const jsonData = document.getElementById('product-data').textContent;
        const data = JSON.parse(jsonData);

        // Inject Data into DOM Elements
        document.getElementById('release-badge').textContent = data.releaseDateFormatted;
        document.getElementById('movie-title').textContent = data.title;
        document.getElementById('movie-subtitle').textContent = data.subtitle;
        document.getElementById('movie-synopsis').textContent = data.synopsis;
        
        // Specs Injection
        document.getElementById('spec-audio').textContent = data.specs.audio;
        document.getElementById('spec-subtitles').textContent = data.specs.subtitles;
        document.getElementById('spec-aspect').textContent = data.specs.aspectRatio;
        document.getElementById('spec-runtime').textContent = data.specs.runtime;

        // Features Injection
        const featuresList = document.getElementById('special-features-list');
        featuresList.innerHTML = ''; // Clear fallback text
        data.specialFeatures.forEach(function(feature) {
            const li = document.createElement('li');
            li.textContent = feature;
            featuresList.appendChild(li);
        });
    });

    // Tab Navigation Logic
    function switchTab(event, tabId) {
        // Hide all tab content elements
        const tabContents = document.getElementsByClassName("tab-content");
        for (let i = 0; i < tabContents.length; i++) {
            tabContents[i].classList.remove("active");
        }

        // Remove active styling from all tab buttons
        const tabButtons = document.getElementsByClassName("tab-button");
        for (let i = 0; i < tabButtons.length; i++) {
            tabButtons[i].classList.remove("active");
        }

        // Show current tab, and add active class to clicked button
        document.getElementById(tabId).classList.add("active");
        event.currentTarget.classList.add("active");
    }
</script>

</body>
</html>
