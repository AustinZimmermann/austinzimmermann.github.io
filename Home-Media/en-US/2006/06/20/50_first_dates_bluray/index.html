<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>50 First Dates (Blu-ray)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="movie-card">
        <div class="image-container">
            <img src="https://images.blu-ray.com/movies/covers/116_front.jpg" alt="50 First Dates Front Cover" id="cover-image">
            <button id="flip-btn">View Back Cover</button>
        </div>
        <div class="movie-details">
            <h1>50 First Dates</h1>
            <p class="label">Original Release: <span>2004</span></p>
            <p class="label">Format: <span>Blu-ray</span></p>
            <p class="label">Blu-ray Release Date: <span>June 20, 2006</span></p>
            <p class="label">Studio: <span>Sony Pictures Home Entertainment</span></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
