<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hitch (Blu-ray, 2005) - Sony Pictures Home Entertainment</title>
    <style>
        :root {
            --bg-color: #0a0f18;
            --card-bg: #121926;
            --accent-color: #ff3333;
            --accent-blue: #00d2ff;
            --text-main: #ffffff;
            --text-muted: #8a99ad;
            --border-color: #1e293b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
            border: 1px solid var(--border-color);
            display: grid;
            grid-template-columns: 1fr;
        }

        @media (min-width: 768px) {
            .container {
                grid-template-columns: 350px 1fr;
            }
        }

        /* Left Column: Cover Art */
        .cover-art-panel {
            background: #05080f;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            border-right: 1px solid var(--border-color);
        }

        .cover-art-panel img {
            max-width: 100%;
            height: auto;
            border-radius: 6px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.6);
            transition: transform 0.3s ease;
        }

        .cover-art-panel img:hover {
            transform: scale(1.02);
        }

        .bluray-badge {
            margin-top: 20px;
            background: linear-gradient(90deg, #005c97, #00d2ff);
            color: white;
            padding: 4px 15px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.3);
        }

        /* Right Column: Details */
        .details-panel {
            padding: 40px;
            display: flex;
            flex-direction: column;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 5px;
            letter-spacing: -0.5px;
        }

        .meta-line {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .meta-line span::after {
            content: "|";
            margin-left: 15px;
            color: #2e3e56;
        }

        .meta-line span:last-child::after {
            content: "";
        }

        .tagline {
            font-style: italic;
            color: var(--accent-blue);
            margin-bottom: 20px;
            font-size: 1.05rem;
        }

        .section-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            margin-bottom: 8px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 4px;
        }

        .synopsis {
            font-size: 0.95rem;
            color: #cbd5e1;
            margin-bottom: 25px;
            text-align: left;
        }

        .specs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .spec-item .label {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-muted);
            display: block;
            margin-bottom: 2px;
        }

        .spec-item .value {
            font-size: 0.95rem;
            font-weight: 600;
        }

        /* Tech HUD aesthetic for special note */
        .hud-note {
            background: rgba(255, 51, 51, 0.05);
            border-left: 3px solid var(--accent-color);
            padding: 12px 15px;
            border-radius: 0 6px 6px 0;
            font-size: 0.85rem;
            color: #fca5a5;
        }
    </style>
</head>
<body>

    <div class="container" id="movie-card">
        </div>

    <script>
        // Emulated data.json file structure
        const jsonData = {
    "title": "Hitch",
    "year": 2005,
    "format": "Blu-ray",
    "releaseDate": "June 20, 2006",
    "studio": "Sony Pictures Home Entertainment",
    "imageUrl": "https://images.static-bluray.com/movies/covers/32_front.jpg",
    "rating": "PG-13",
    "runtime": "118 min",
    "tagline": "The Cure for the Common Man.",
    "synopsis": "Alex “Hitch” Hitchens is a legendary, and deliberately anonymous, New York City “date doctor” who, for a fee, has helped countless men woo the women of their dreams. While coaching Albert, a meek accountant smitten with a glamorous celebrity, Hitch meets Sara Melas, a gossip columnist who threatens to blow his cover.",
    "specs": {
        "videoCodec": "MPEG-2",
        "resolution": "1080p (2.40:1)",
        "audio": "English Uncompressed PCM 5.1, English Dolby Digital 5.1, French (Canadian) Dolby Digital 5.1",
        "subtitles": "English, English SDH, French, Spanish, Portuguese, Korean, Thai"
    },
    "historicalNote": "This title was part of the historic initial launch lineup of the Blu-ray format on June 20, 2006."
};

        // UI rendering function using the JSON data
        function renderMoviePage(data) {
            const card = document.getElementById('movie-card');
            
            card.innerHTML = `
                <div class="cover-art-panel">
                    <img src="${data.imageUrl}" alt="${data.title} Blu-ray Cover">
                    <div class="bluray-badge">${data.format} Disc</div>
                </div>
                <div class="details-panel">
                    <h1>${data.title}</h1>
                    <div class="meta-line">
                        <span>${data.year}</span>
                        <span>${data.rating}</span>
                        <span>${data.runtime}</span>
                    </div>
                    
                    <p class="tagline">“${data.tagline}”</p>
                    
                    <h3 class="section-title">Synopsis</h3>
                    <p class="synopsis">${data.synopsis}</p>
                    
                    <h3 class="section-title">Technical Specs</h3>
                    <div class="specs-grid">
                        <div class="spec-item">
                            <span class="label">Studio</span>
                            <span class="value">${data.studio}</span>
                        </div>
                        <div class="spec-item">
                            <span class="label">Blu-ray Release</span>
                            <span class="value">${data.releaseDate}</span>
                        </div>
                        <div class="spec-item">
                            <span class="label">Video Codec</span>
                            <span class="value">${data.specs.videoCodec}</span>
                        </div>
                        <div class="spec-item">
                            <span class="label">Resolution</span>
                            <span class="value">${data.specs.resolution}</span>
                        </div>
                        <div class="spec-item" style="grid-column: span 2;">
                            <span class="label">Audio Tracks</span>
                            <span class="value">${data.specs.audio}</span>
                        </div>
                    </div>
                    
                    <div class="hud-note">
                        <strong>Format Note:</strong> ${data.historicalNote}
                    </div>
                </div>
            `;
        }

        // Initialize template
        document.addEventListener('DOMContentLoaded', () => {
            renderMoviePage(jsonData);
        });
    </script>
</body>
</html>
