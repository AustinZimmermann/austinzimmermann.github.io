<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Click Blu-ray (2006) - Sony Pictures Home Entertainment</title>
    <style>
        :root {
            --bg-color: #0c101b;
            --card-bg: #172033;
            --accent-blue: #2563eb;
            --accent-glow: #38bdf8;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #2e3d59;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-color);
            display: grid;
            grid-template-columns: 1fr;
        }

        @media (min-width: 768px) {
            .container {
                grid-template-columns: 340px 1fr;
            }
        }

        /* Left Column: Cover Art & Remote Interface Hook */
        .cover-art-panel {
            background: #090d16;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            border-right: 1px solid var(--border-color);
        }

        .cover-art-panel img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.8);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .cover-art-panel img:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
        }

        .bluray-badge {
            margin-top: 25px;
            background: linear-gradient(90deg, #1d4ed8, #0ea5e9);
            color: white;
            padding: 6px 18px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Right Column: Information Display */
        .details-panel {
            padding: 40px;
            display: flex;
            flex-direction: column;
        }

        h1 {
            font-size: 2.4rem;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 5px;
            color: #fff;
        }

        .meta-line {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 25px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .meta-line span::after {
            content: "•";
            margin-left: 15px;
            color: #475569;
        }

        .meta-line span:last-child::after {
            content: "";
        }

        .tagline {
            font-style: italic;
            color: var(--accent-glow);
            margin-bottom: 25px;
            font-size: 1.1rem;
            font-weight: 500;
        }

        .section-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            margin-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 6px;
        }

        .synopsis {
            font-size: 0.95rem;
            color: #cbd5e1;
            margin-bottom: 30px;
            text-align: left;
        }

        .specs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .spec-item .label {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-muted);
            display: block;
            margin-bottom: 2px;
            letter-spacing: 0.5px;
        }

        .spec-item .value {
            font-size: 0.95rem;
            font-weight: 600;
            color: #f1f5f9;
        }

        .remote-ui-footer {
            background: rgba(56, 189, 248, 0.04);
            border: 1px dashed rgba(56, 189, 248, 0.2);
            padding: 12px 15px;
            border-radius: 8px;
            font-size: 0.85rem;
            color: #e2e8f0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .remote-icon {
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: var(--accent-glow);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--accent-glow);
        }
    </style>
</head>
<body>

    <div class="container" id="bluray-card">
        </div>

    <script>
        // Emulated data.json file payload
        const dataJson = {
            "title": "Click",
            "year": 2006,
            "format": "Blu-ray",
            "releaseDate": "2006-10-10",
            "studio": "Sony Pictures Home Entertainment",
            "imageUrl": "https://images.static-bluray.com/movies/covers/141_front.jpg",
            "rating": "PG-13",
            "runtime": "107 min",
            "tagline": "What if you had a universal remote... that controlled your life?",
            "synopsis": "Michael Newman is a hard-working family man who is driven to get a promotion at his architecture firm. Things take a surreal turn when he obtains a magical universal remote control from an eccentric inventor that allows him to fast-forward, pause, and rewind his actual life.",
            "specs": {
                "videoCodec": "MPEG-2",
                "resolution": "1080p (1.85:1)",
                "audio": "English Uncompressed PCM 5.1, English Dolby Digital 5.1, French Dolby Digital 5.1",
                "subtitles": "English, English SDH, French, Spanish, Korean, Thai"
            },
            "features": "Includes Director’s Commentary, Deleted Scenes, and Making-of Featurettes."
        };

        // UI rendering function using the JSON data
        function initializeBluRayPage(movieData) {
            const cardElement = document.getElementById('bluray-card');
            
            cardElement.innerHTML = `
                <div class="cover-art-panel">
                    <img src="${movieData.imageUrl}" alt="${movieData.title} Blu-ray Cover Packaging">
                    <div class="bluray-badge">${movieData.format} Disc</div>
                </div>
                <div class="details-panel">
                    <h1>${movieData.title}</h1>
                    <div class="meta-line">
                        <span>${movieData.year}</span>
                        <span>${movieData.rating}</span>
                        <span>${movieData.runtime}</span>
                    </div>
                    
                    <p class="tagline">${movieData.tagline}</p>
                    
                    <h3 class="section-title">Synopsis</h3>
                    <p class="synopsis">${movieData.synopsis}</p>
                    
                    <h3 class="section-title">Technical Specifications</h3>
                    <div class="specs-grid">
                        <div class="spec-item">
                            <span class="label">Studio</span>
                            <span class="value">${movieData.studio}</span>
                        </div>
                        <div class="spec-item">
                            <span class="label">Release Date</span>
                            <span class="value">${movieData.releaseDate}</span>
                        </div>
                        <div class="spec-item">
                            <span class="label">Video Codec</span>
                            <span class="value">${movieData.specs.videoCodec}</span>
                        </div>
                        <div class="spec-item">
                            <span class="label">Resolution</span>
                            <span class="value">${movieData.specs.resolution}</span>
                        </div>
                        <div class="spec-item" style="grid-column: span 2;">
                            <span class="label">Audio Tracks</span>
                            <span class="value">${movieData.specs.audio}</span>
                        </div>
                    </div>
                    
                    <div class="remote-ui-footer">
                        <span class="remote-icon"></span>
                        <span><strong>Special Features:</strong> ${movieData.features}</span>
                    </div>
                </div>
            `;
        }

        // Build page layout on load
        document.addEventListener('DOMContentLoaded', () => {
            initializeBluRayPage(dataJson);
        });
    </script>
</body>
</html>
