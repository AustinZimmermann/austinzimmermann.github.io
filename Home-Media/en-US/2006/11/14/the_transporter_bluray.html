<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Transporter Blu-ray (2002) - 20th Century Fox</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --accent-amber: #ffaa00;
            --accent-silver: #c9d1d9;
            --text-main: #f0f6fc;
            --text-muted: #8b949e;
            --border-color: #30363d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            border: 1px solid var(--border-color);
            display: grid;
            grid-template-columns: 1fr;
        }

        @media (min-width: 768px) {
            .container {
                grid-template-columns: 350px 1fr;
            }
        }

        /* Cover Art Section */
        .cover-art-panel {
            background: #070a0e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            border-right: 1px solid var(--border-color);
        }

        .cover-art-panel img {
            max-width: 100%;
            height: auto;
            border-radius: 6px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.7);
            transition: transform 0.3s ease;
        }

        .cover-art-panel img:hover {
            transform: scale(1.02);
        }

        .bluray-badge {
            margin-top: 20px;
            background: linear-gradient(135deg, #0044ff, #00bcff);
            color: white;
            padding: 5px 18px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Movie Details Section */
        .details-panel {
            padding: 40px;
            display: flex;
            flex-direction: column;
        }

        h1 {
            font-size: 2.4rem;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 5px;
            letter-spacing: -0.5px;
        }

        .meta-line {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 25px;
            display: flex;
            gap: 15px;
        }

        .meta-line span::after {
            content: "•";
            margin-left: 15px;
            color: #484f58;
        }

        .meta-line span:last-child::after {
            content: "";
        }

        .rules-box {
            background: rgba(255, 170, 0, 0.05);
            border: 1px dashed rgba(255, 170, 0, 0.3);
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 25px;
        }

        .rules-box h4 {
            color: var(--accent-amber);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .rules-box ul {
            list-style: none;
            font-size: 0.85rem;
            color: var(--accent-silver);
        }

        .section-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            margin-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 4px;
        }

        .synopsis {
            font-size: 0.95rem;
            color: #c9d1d9;
            margin-bottom: 25px;
            text-align: left;
        }

        .specs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
        }

        .spec-item .label {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-muted);
            display: block;
            margin-bottom: 2px;
        }

        .spec-item .value {
            font-size: 0.95rem;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="container" id="media-card">
        </div>

    <script>
        // Emulated data.json structure
        const dataJson = {
            "title": "The Transporter",
            "year": 2002,
            "format": "Blu-ray",
            "releaseDate": "2006-11-14",
            "studio": "20th Century Fox Home Entertainment",
            "imageUrl": "https://images.static-bluray.com/movies/covers/155_front.jpg",
            "rating": "PG-13",
            "runtime": "92 min",
            "language": "en-US",
            "synopsis": "Rules-breaking driver Frank Martin is a mercenary “transporter” who delivers goods with no questions asked. But his latest shipment—a beautiful woman kidnapped by international slave traders--brings deadly complications to his hyper-efficient operational delivery system.",
            "rules": [
                "1. Never change the deal.",
                "2. No names.",
                "3. Never look in the package."
            ],
            "specs": {
                "videoCodec": "MPEG-2",
                "resolution": "1080p (2.35:1)",
                "audio": "English DTS-HD Master Audio 5.1, French Dolby Digital 5.1, Spanish Dolby Digital 5.1",
                "subtitles": "English, Spanish"
            }
        };

        // Render function mapping JSON values to HTML template
        function renderPage(data) {
            const container = document.getElementById('media-card');
            
            container.innerHTML = `
                <div class="cover-art-panel">
                    <img src="${data.imageUrl}" alt="${data.title} Blu-ray Cover">
                    <div class="bluray-badge">${data.format}</div>
                </div>
                <div class="details-panel">
                    <h1>${data.title}</h1>
                    <div class="meta-line">
                        <span>${data.year}</span>
                        <span>${data.rating}</span>
                        <span>${data.runtime}</span>
                    </div>

                    <div class="rules-box">
                        <h4>The Transporter’s Rules</h4>
                        <ul>
                            ${data.rules.map(rule => `<li>${rule}</li>`).join('')}
                        </ul>
                    </div>
                    
                    <h3 class="section-title">Synopsis</h3>
                    <p class="synopsis">${data.synopsis}</p>
                    
                    <h3 class="section-title">Technical Specs</h3>
                    <div class="specs-grid">
                        <div class="spec-item">
                            <span class="label">Studio</span>
                            <span class="value">${data.studio}</span>
                        </div>
                        <div class="spec-item">
                            <span class="label">Release Date</span>
                            <span class="value">${data.releaseDate}</span>
                        </div>
                        <div class="spec-item">
                            <span class="label">Video Codec</span>
                            <span class="value">${data.specs.videoCodec}</span>
                        </div>
                        <div class="spec-item">
                            <span class="label">Resolution</span>
                            <span class="value">${data.specs.resolution}</span>
                        </div>
                        <div class="spec-item" style="grid-column: span 2;">
                            <span class="label">Audio</span>
                            <span class="value">${data.specs.audio}</span>
                        </div>
                    </div>
                </div>
            `;
        }

        // Initialize display on content load
        document.addEventListener('DOMContentLoaded', () => {
            renderPage(dataJson);
        });
    </script>
</body>
</html>
