<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-Men: The Last Stand Blu-ray (2006) - 20th Century Fox</title>
    <style>
        :root {
            --bg-dark: #060913;
            --panel-bg: #0d1527;
            --accent-gold: #f59e0b;
            --accent-blue: #2563eb;
            --text-light: #f8fafc;
            --text-dim: #94a3b8;
            --border-glow: #1e293b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 950px;
            width: 100%;
            background: var(--panel-bg);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8), 0 0 25px rgba(37, 99, 235, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: grid;
            grid-template-columns: 1fr;
        }

        @media (min-width: 768px) {
            .container {
                grid-template-columns: 360px 1fr;
            }
        }

        /* Cover Artwork Column */
        .art-aside {
            background: #03050a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 30px;
            border-right: 1px solid var(--border-glow);
        }

        .art-aside img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.7);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .art-aside img:hover {
            transform: scale(1.03);
        }

        .media-tag {
            margin-top: 25px;
            background: linear-gradient(135deg, #1d4ed8, #3b82f6);
            color: #fff;
            padding: 6px 18px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.4);
        }

        /* Details Specification Column */
        .details-main {
            padding: 45px;
            display: flex;
            flex-direction: column;
        }

        h1 {
            font-size: 2.4rem;
            font-weight: 800;
            line-height: 1.15;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
            background: linear-gradient(120deg, #fff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .meta-strip {
            font-size: 0.9rem;
            color: var(--text-dim);
            margin-bottom: 25px;
            display: flex;
            gap: 15px;
        }

        .meta-strip span:not(:last-child)::after {
            content: "•";
            margin-left: 15px;
            color: #334155;
        }

        .hook-line {
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--accent-gold);
            margin-bottom: 20px;
            border-left: 3px solid var(--accent-gold);
            padding-left: 12px;
        }

        .block-header {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-dim);
            margin-bottom: 10px;
            border-bottom: 1px solid #1e293b;
            padding-bottom: 6px;
        }

        .plot-summary {
            font-size: 0.95rem;
            color: #e2e8f0;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .grid-specs {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .spec-node {
            display: flex;
            flex-direction: column;
        }

        .spec-node .heading {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-dim);
            margin-bottom: 2px;
        }

        .spec-node .body-text {
            font-size: 0.95rem;
            font-weight: 600;
            color: #f1f5f9;
        }

        .span-full {
            grid-column: 1 / -1;
        }
    </style>
</head>
<body>

    <div class="container" id="bluray-profile">
        </div>

    <script>
        // data.json structural object representation
        const dataset = {
            "title": "X-Men: The Last Stand",
            "year": 2006,
            "format": "Blu-ray",
            "releaseDate": "2006-11-14",
            "studio": "20th Century Fox Home Entertainment",
            "locale": "en-US",
            "imageUrl": "https://images.static-bluray.com/movies/covers/208_front.jpg",
            "rating": "PG-13",
            "runtime": "104 min",
            "tagline": "Take a Stand",
            "synopsis": "When a cure is found to treat mutations, lines are drawn among the X-Men, led by Professor Charles Xavier, and the Brotherhood, a band of powerful mutants organized by Xavier’s former ally, Magneto. This discovery forces them to choose between conforming to fit into society or preserving their uniqueness to fight a war that could end all wars.",
            "technicalSpecs": {
                "videoCodec": "AVC MPEG-4",
                "resolution": "1080p (2.40:1)",
                "audio": "English DTS-HD Master Audio 6.1, French Dolby Digital 5.1, Spanish Dolby Digital 5.1",
                "subtitles": "English SDH, Spanish"
            }
        };

        // DOM Manipulation / Rendering Logic
        function generateProfile(data) {
            const profileTarget = document.getElementById('bluray-profile');
            
            profileTarget.innerHTML = `
                <aside class="art-aside">
                    <img src="${data.imageUrl}" alt="${data.title} Cover Art">
                    <div class="media-tag">${data.format} Profile</div>
                </aside>
                
                <main class="details-main">
                    <h1>${data.title}</h1>
                    <div class="meta-strip">
                        <span>${data.year}</span>
                        <span>${data.rating}</span>
                        <span>${data.runtime}</span>
                    </div>
                    
                    <div class="hook-line">“${data.tagline}”</div>
                    
                    <h2 class="block-header">Synopsis</h2>
                    <p class="plot-summary">${data.synopsis}</p>
                    
                    <h2 class="block-header">Specifications</h2>
                    <div class="grid-specs">
                        <div class="spec-node">
                            <span class="heading">Studio</span>
                            <span class="body-text">${data.studio}</span>
                        </div>
                        <div class="spec-node">
                            <span class="heading">Street Date</span>
                            <span class="body-text">${data.releaseDate}</span>
                        </div>
                        <div class="spec-node">
                            <span class="heading">Video Codec</span>
                            <span class="body-text">${data.technicalSpecs.videoCodec}</span>
                        </div>
                        <div class="spec-node">
                            <span class="heading">Aspect Ratio</span>
                            <span class="body-text">${data.technicalSpecs.resolution}</span>
                        </div>
                        <div class="spec-node span-full">
                            <span class="heading">Audio Options</span>
                            <span class="body-text">${data.technicalSpecs.audio}</span>
                        </div>
                        <div class="spec-node span-full">
                            <span class="heading">Subtitles</span>
                            <span class="body-text">${data.technicalSpecs.subtitles}</span>
                        </div>
                    </div>
                </main>
            `;
        }

        // Initialize execution on load
        document.addEventListener('DOMContentLoaded', () => {
            generateProfile(dataset);
        });
    </script>
</body>
</html>
