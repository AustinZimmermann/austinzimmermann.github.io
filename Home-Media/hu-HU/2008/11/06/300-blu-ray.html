<!DOCTYPE html>
<html lang="hu-HU">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>300 Blu-ray (2007) - Warner Home Video</title>
    <style>
        :root {
            --bg-color: #0f0f12;
            --card-bg: #1a1a24;
            --accent-color: #b32626;
            --text-color: #e2e8f0;
            --text-muted: #94a3b8;
            --border-color: #2d2d3d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Helvetica, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 2rem 1rem;
            line-height: 1.6;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 1rem;
        }

        header h1 {
            font-size: 2.5rem;
            letter-spacing: 2px;
            color: #fff;
            text-transform: uppercase;
        }

        header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .movie-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
            background: var(--card-bg);
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid var(--border-color);
        }

        @media (min-width: 768px) {
            .movie-grid {
                grid-template-columns: 350px 1fr;
            }
        }

        .cover-art {
            text-align: center;
        }

        .cover-art img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.6);
            border: 1px solid var(--border-color);
        }

        .details h2 {
            color: #fff;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
            margin-bottom: 1rem;
            font-size: 1.8rem;
        }

        .meta-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 1.5rem;
        }

        .meta-table td {
            padding: 0.6rem 0.4rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .meta-table td:first-child {
            font-weight: bold;
            color: var(--text-muted);
            width: 35%;
        }

        .badge {
            background-color: var(--accent-color);
            color: white;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: bold;
            display: inline-block;
        }

        .specs-section {
            margin-top: 1.5rem;
        }

        .specs-section h3 {
            color: #fff;
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
        }

        .specs-list {
            list-style: none;
            padding-left: 0;
        }

        .specs-list li {
            margin-bottom: 0.4rem;
            padding-left: 1.2rem;
            position: relative;
        }

        .specs-list li::before {
            content: "•";
            color: var(--accent-color);
            font-weight: bold;
            position: absolute;
            left: 0;
        }

        footer {
            text-align: center;
            margin-top: 3rem;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1 id="page-title">300 Blu-ray</h1>
            <p>Magyarországi Kiadás Specifikációk</p>
        </header>

        <main class="movie-grid">
            <div class="cover-art">
                <img id="movie-cover" src="" alt="300 Blu-ray Cover">
            </div>

            <div class="details">
                <h2 id="movie-title">Betöltés...</h2>
                
                <table class="meta-table">
                    <tr>
                        <td>Kiadó:</td>
                        <td id="meta-publisher"></td>
                    </tr>
                    <tr>
                        <td>Kiadási dátum:</td>
                        <td id="meta-release-date"></td>
                    </tr>
                    <tr>
                        <td>Formátum:</td>
                        <td><span class="badge" id="meta-format"></span></td>
                    </tr>
                    <tr>
                        <td>Videó kodek:</td>
                        <td id="meta-codec"></td>
                    </tr>
                    <tr>
                        <td>Eredeti megjelenés:</td>
                        <td id="meta-year"></td>
                    </tr>
                </table>

                <div class="specs-section">
                    <h3>Hangsávok</h3>
                    <ul class="specs-list" id="audio-list"></ul>
                </div>

                <div class="specs-section">
                    <h3>Feliratok</h3>
                    <ul class="specs-list" id="subtitle-list"></ul>
                </div>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 Blu-ray Adatbázis. Warner Home Video / Legendary Pictures.</p>
        </footer>
    </div>

    <script>
        // Beágyazott JSON struktúra a kért adatokkal
        const bdReleaseData = {
            "title": "300",
            "originalYear": 2007,
            "publisher": "Warner Home Video",
            "regionCode": "hu-HU",
            "releaseDate": "2008-11-06",
            "format": "Blu-ray",
            "videoCodec": "VC-1 (1080p)",
            "coverUrl": "https://images.static-bluray.com/movies/covers/73921_front.jpg",
            "audioTracks": [
                "Angol Dolby TrueHD 5.1",
                "Magyar Dolby Digital 5.1",
                "Cseh Dolby Digital 5.1",
                "Lengyel Dolby Digital 5.1",
                "Orosz Dolby Digital 5.1",
                "Török Dolby Digital 5.1"
            ],
            "subtitles": [
                "Magyar",
                "Angol",
                "Cseh",
                "Lengyel",
                "Orosz",
                "Török",
                "Román"
            ]
        };

        // DOM elemek feltöltése dinamikusan a JavaScript / JSON adatokból
        document.addEventListener("DOMContentLoaded", () => {
            // Címek és alapadatok
            document.getElementById("movie-title").innerText = `${bdReleaseData.title} (${bdReleaseData.originalYear})`;
            document.getElementById("movie-cover").src = bdReleaseData.coverUrl;
            document.getElementById("movie-cover").alt = `${bdReleaseData.title} Blu-ray borító`;
            
            document.getElementById("meta-publisher").innerText = bdReleaseData.publisher;
            document.getElementById("meta-release-date").innerText = bdReleaseData.releaseDate;
            document.getElementById("meta-format").innerText = bdReleaseData.format;
            document.getElementById("meta-codec").innerText = bdReleaseData.videoCodec;
            document.getElementById("meta-year").innerText = bdReleaseData.originalYear;

            // Hangsávok listázása
            const audioList = document.getElementById("audio-list");
            bdReleaseData.audioTracks.forEach(track => {
                const li = document.createElement("li");
                li.innerText = track;
                audioList.appendChild(li);
            });

            // Feliratok listázása
            const subtitleList = document.getElementById("subtitle-list");
            bdReleaseData.subtitles.forEach(sub => {
                const li = document.createElement("li");
                li.innerText = sub;
                subtitleList.appendChild(li);
            });
        });
    </script>
</body>
</html>
