<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image-to-Image Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loader { border-top-color: #3b82f6; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 min-h-screen p-4 md:p-8">
    <div class="max-w-3xl mx-auto bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
        <h1 class="text-2xl font-bold text-gray-900 mb-2">AI Image Editor</h1>
        <p class="text-gray-600 mb-6">Upload an image and tell the AI how to transform it.</p>

        <div class="space-y-4">
            <div id="dropZone" class="border-2 border-dashed border-gray-300 rounded-xl p-8 text-center cursor-pointer hover:border-blue-400 transition-colors">
                <input type="file" id="imageInput" class="hidden" accept="image/*">
                <p id="dropText" class="text-gray-500">Click to upload or drag & drop an image</p>
                <img id="preview" class="hidden max-h-64 mx-auto mt-4 rounded-lg shadow-sm">
            </div>

            <textarea id="promptInput" class="w-full p-4 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" rows="3" placeholder="e.g., 'Change the background to a sunset beach' or 'Add a fantasy hat to the person'"></textarea>

            <button id="generateBtn" class="w-full bg-blue-600 text-white font-semibold py-3 rounded-xl hover:bg-blue-700 transition-colors disabled:bg-gray-400">
                Generate Transformation
            </button>
        </div>

        <div id="loading" class="hidden mt-8 text-center">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12 mx-auto mb-4"></div>
            <p class="text-gray-600 font-medium">Processing your image...</p>
        </div>

        <div id="resultContainer" class="hidden mt-8">
            <h2 class="text-lg font-bold mb-4">Result:</h2>
            <img id="resultImage" class="w-full rounded-xl shadow-md">
        </div>
    </div>

    <script>
        const imageInput = document.getElementById('imageInput');
        const dropZone = document.getElementById('dropZone');
        const preview = document.getElementById('preview');
        const generateBtn = document.getElementById('generateBtn');
        const promptInput = document.getElementById('promptInput');
        const loading = document.getElementById('loading');
        const resultContainer = document.getElementById('resultContainer');
        const resultImage = document.getElementById('resultImage');

        let base64Image = '';

        dropZone.onclick = () => imageInput.click();

        imageInput.onchange = (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                base64Image = e.target.result.split(',')[1];
                preview.src = e.target.result;
                preview.classList.remove('hidden');
                document.getElementById('dropText').classList.add('hidden');
            };
            reader.readAsDataURL(file);
        };

        generateBtn.onclick = async () => {
            if (!base64Image || !promptInput.value) return;

            loading.classList.remove('hidden');
            resultContainer.classList.add('hidden');
            generateBtn.disabled = true;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-image-preview:generateContent?key=`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: promptInput.value },
                                { inlineData: { mimeType: "image/png", data: base64Image } }
                            ]
                        }],
                        generationConfig: { responseModalities: ['TEXT', 'IMAGE'] }
                    })
                });

                const data = await response.json();
                const part = data.candidates[0].content.parts.find(p => p.inlineData);
                if (part) {
                    resultImage.src = `data:image/png;base64,${part.inlineData.data}`;
                    resultContainer.classList.remove('hidden');
                }
            } catch (err) {
                console.error(err);
            } finally {
                loading.classList.add('hidden');
                generateBtn.disabled = false;
            }
        };
    </script>
</body>
</html>
