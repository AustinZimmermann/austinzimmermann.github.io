<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greek SSML Text-to-Speech Studio</title>
    <style>
        :root {
            --primary: #005bae;
            --primary-hover: #004485;
            --bg: #f4f7f6;
            --card-bg: #ffffff;
            --text: #333333;
            --border: #cccccc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: var(--primary);
            text-align: center;
            margin-top: 0;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
            margin-top: 20px;
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }

        .sidebar {
            border-right: 1px solid var(--border);
            padding-right: 20px;
        }

        @media (max-width: 768px) {
            .sidebar {
                border-right: none;
                padding-right: 0;
                border-bottom: 1px solid var(--border);
                padding-bottom: 20px;
            }
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 10px;
            color: #555;
        }

        select, textarea, button {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 1rem;
            box-sizing: border-box;
        }

        textarea {
            font-family: 'Courier New', Courier, monospace;
            resize: vertical;
            height: 250px;
        }

        .preset-btn {
            background-color: #e9ecef;
            color: var(--text);
            border: 1px solid #ddd;
            text-align: left;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .preset-btn:hover {
            background-color: #dee2e6;
        }

        .preset-list {
            max-height: 300px;
            overflow-y: auto;
        }

        button.main-btn {
            background-color: var(--primary);
            color: white;
            font-weight: bold;
            border: none;
            cursor: pointer;
            font-size: 1.1rem;
            transition: background 0.3s;
        }

        button.main-btn:hover {
            background-color: var(--primary-hover);
        }

        .status {
            padding: 10px;
            border-radius: 6px;
            background-color: #e8f4fd;
            color: #004485;
            font-size: 0.9rem;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Ελληνικό SSML Text-to-Speech</h1>
    
    <div class="grid">
        <div class="sidebar">
            <div class="section-title">1. Επιλογή Φωνής (Voice)</div>
            <select id="voiceSelect">
                <option value="">Φορτώνει φωνές...</option>
            </select>

            <div class="section-title">2. Παραδείγματα SSML</div>
            <div id="presetContainer" class="preset-list">
                </div>
        </div>

        <div class="main-content">
            <div class="section-title">3. Επεξεργασία SSML Κειμένου</div>
            <textarea id="ssmlInput" placeholder="Γράψτε το SSML σας εδώ..."></textarea>
            
            <button id="speakBtn" class="main-btn">Αναπαραγωγή (Speak)</button>
            <button id="stopBtn" style="background-color: #dc3545; color: white; border: none; cursor: pointer;">Διακοπή (Stop)</button>

            <div id="statusMessage" class="status"></div>
        </div>
    </div>
</div>

<script>
    // Embedded JSON Data (data.json replacement)
    const ssmlData = {
        "presets": [
            {
                "title": "Βασικό Καλωσόρισμα (Standard)",
                "description": "Απλή εισαγωγή με προφορά",
                "ssml": "<speak>\n  <lang xml:lang=\"el-GR\">\n    Γεια σας! Καλώς ορίσατε στην εφαρμογή μετατροπής κειμένου σε ομιλία.\n  </lang>\n</speak>"
            },
            {
                "title": "Παύσεις & Ρυθμός (Breaks & Prosody)",
                "description": "Χρήση break για φυσικότητα",
                "ssml": "<speak>\n  <lang xml:lang=\"el-GR\">\n    Προσοχή! <break time=\"800ms\"/> \n    Το τρένο για Θεσσαλονίκη αναχωρεί <prosody rate=\"slow\">αμέσως.</prosody>\n  </lang>\n</speak>"
            },
            {
                "title": "Έμφαση Λέξεων (Emphasis)",
                "description": "Τονισμός συγκεκριμένης λέξης",
                "ssml": "<speak>\n  <lang xml:lang=\"el-GR\">\n    Δεν είπα ότι <emphasis level=\"strong\">αυτός</emphasis> πήρε τα κλειδιά.\n  </lang>\n</speak>"
            },
            {
                "title": "Ανάγνωση Αριθμών (Say-As)",
                "description": "Πώς προφέρονται ημερομηνίες και τηλέφωνα",
                "ssml": "<speak>\n  <lang xml:lang=\"el-GR\">\n    Η συνάντηση είναι στις \n    <say-as interpret-as=\"date\" format=\"dmyt\">25-12-2026</say-as>. \n    Καλέστε στο \n    <say-as interpret-as=\"telephone\">2101234567</say-as>.\n  </lang>\n</speak>"
            },
            {
                "title": "Ψίθυρος (Whisper Effect)",
                "description": "Χαμηλή ένταση για μυστικότητα",
                "ssml": "<speak>\n  <lang xml:lang=\"el-GR\">\n    <prosody volume=\"soft\" pitch=\"low\">Ψιθύρισέ μου το μυστικό, να μην το ακούσει κανείς.</prosody>\n  </lang>\n</speak>"
            }
        ]
    };

    // Global variables
    let synth = window.speechSynthesis;
    let voices = [];
    const voiceSelect = document.getElementById('voiceSelect');
    const ssmlInput = document.getElementById('ssmlInput');
    const presetContainer = document.getElementById('presetContainer');
    const speakBtn = document.getElementById('speakBtn');
    const stopBtn = document.getElementById('stopBtn');
    const statusMessage = document.getElementById('statusMessage');

    // 1. Populate Greek and compatible voices
    function populateVoiceList() {
        if (typeof synth === 'undefined') return;
        
        voices = synth.getVoices();
        voiceSelect.innerHTML = '';
        
        // Filter for Greek voices primarily, fallback to all if none found
        let greekVoices = voices.filter(voice => voice.lang.includes('el') || voice.lang.includes('EL'));
        
        if(greekVoices.length === 0) {
            // Fallback list to let the user choose standard engine voices if el-GR is missing natively
            showStatus("Δεν βρέθηκε εγγενής Ελληνική φωνή στο σύστημα. Εμφάνιση όλων των διαθέσιμων φωνών.");
            greekVoices = voices;
        }

        greekVoices.forEach((voice) => {
            const option = document.createElement('option');
            option.textContent = `${voice.name} (${voice.lang})`;
            option.setAttribute('data-lang', voice.lang);
            option.setAttribute('data-name', voice.name);
            voiceSelect.appendChild(option);
        });
    }

    // Handle asynchronous voice loading in browsers
    populateVoiceList();
    if (typeof synth !== 'undefined' && synth.onvoiceschanged !== undefined) {
        synth.onvoiceschanged = populateVoiceList;
    }

    // 2. Load presets into sidebar from our JSON structure
    function loadPresets() {
        ssmlData.presets.forEach((preset, index) => {
            const btn = document.createElement('button');
            btn.className = 'preset-btn';
            btn.innerHTML = `<strong>${preset.title}</strong><br><small style="color:#666;">${preset.description}</small>`;
            btn.onclick = () => {
                ssmlInput.value = preset.ssml;
            };
            presetContainer.appendChild(btn);
        });
        
        // Set default text to first preset
        if(ssmlData.presets.length > 0) {
            ssmlInput.value = ssmlData.presets[0].ssml;
        }
    }

    // 3. Helper function to strip SSML tags for basic Web Speech API usage
    // (Note: Native browser Web Speech API has limited/varying native SSML support, 
    // stripping allows it to gracefully read text without reading out the tags).
    function stripSSML(ssmlText) {
        let cleanText = ssmlText.replace(/<\/?[^>]+(>|$)/g, "");
        // Minor clean up of extra whitespaces
        return cleanText.trim();
    }

    // 4. TTS Execution Logic
    speakBtn.onclick = () => {
        if (synth.speaking) {
            showStatus("Η αναπαραγωγή είναι ήδη σε εξέλιξη...");
            return;
        }

        const rawXml = ssmlInput.value;
        // Strip tags for native SpeechSynthesis alternative
        const cleanText = stripSSML(rawXml);

        if (cleanText === '') {
            showStatus("Παρακαλώ εισάγετε κείμενο προς αναπαραγωγή.");
            return;
        }

        const utterance = new SpeechSynthesisUtterance(cleanText);
        
        // Set selected voice
        const selectedOption = voiceSelect.selectedOptions[0]?.getAttribute('data-name');
        const activeVoice = voices.find(v => v.name === selectedOption);
        if (activeVoice) {
            utterance.voice = activeVoice;
        }

        // Apply fallback configurations based on SSML hints via basic Regex parsing 
        // to approximate SSML behavior natively if the browser does not natively parse SSML.
        if (rawXml.includes('rate="slow"')) utterance.rate = 0.75;
        if (rawXml.includes('rate="fast"')) utterance.rate = 1.3;
        if (rawXml.includes('pitch="low"')) utterance.pitch = 0.7;
        if (rawXml.includes('volume="soft"')) utterance.volume = 0.5;

        utterance.onstart = () => showStatus("Αναπαραγωγή σε εξέλιξη...");
        utterance.onend = () => showStatus("Η αναπαραγωγή ολοκληρώθηκε.");
        utterance.onerror = (e) => showStatus("Σφάλμα κατά την αναπαραγωγή: " + e.error);

        synth.speak(utterance);
    };

    stopBtn.onclick = () => {
        if (synth.speaking) {
            synth.cancel();
            showStatus("Η αναπαραγωγή διακόπηκε από το χρήστη.");
        }
    };

    function showStatus(msg) {
        statusMessage.textContent = msg;
        statusMessage.style.display = 'block';
    }

    // Initialize layout
    loadPresets();
</script>

</body>
</html>
