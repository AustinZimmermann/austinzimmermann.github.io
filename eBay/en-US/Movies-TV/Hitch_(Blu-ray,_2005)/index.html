<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hitch (Blu-ray, 2005) - eBay</title>

    <script type="application/ld+json">
    {
      "@context": "https://schema.org/",
      "@type": "Product",
      "name": "Hitch (Blu-ray, 2005)",
      "image": [
        "https://images.static-bluray.com/movies/covers/32_front.jpg",
        "https://images.static-bluray.com/movies/covers/32_back.jpg"
      ],
      "description": "Original 2006 Blu-ray release of the 2005 romantic comedy Hitch, starring Will Smith.",
      "brand": {
        "@type": "Brand",
        "name": "Sony Pictures"
      },
      "releaseDate": "2006-06-20",
      "offers": {
        "@type": "Offer",
        "url": "https://www.ebay.com/itm/example",
        "priceCurrency": "USD",
        "price": "6.99",
        "itemCondition": "https://schema.org/UsedCondition",
        "availability": "https://schema.org/InStock"
      }
    }
    </script>

    <style>
        body {
            font-family: Helvetica, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f7f7f7;
            color: #333;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex;
            gap: 40px;
        }
        /* Image Gallery Styles */
        .gallery {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .main-image-container {
            width: 100%;
            height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid #ddd;
            border-radius: 4px;
            margin-bottom: 15px;
            padding: 10px;
        }
        .main-image-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        .thumbnails {
            display: flex;
            gap: 10px;
        }
        .thumbnails img {
            width: 80px;
            height: 100px;
            object-fit: cover;
            border: 2px solid transparent;
            cursor: pointer;
            border-radius: 4px;
        }
        .thumbnails img:hover {
            border-color: #0053a0;
        }
        /* Product Details Styles */
        .details {
            flex: 1;
        }
        h1 {
            font-size: 24px;
            margin-top: 0;
            margin-bottom: 10px;
        }
        .condition {
            font-size: 14px;
            color: #555;
            margin-bottom: 20px;
        }
        .price {
            font-size: 32px;
            font-weight: bold;
            color: #333;
            margin: 20px 0;
        }
        .btn-buy {
            background-color: #0053a0;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 10px;
        }
        .btn-buy:hover {
            background-color: #003b73;
        }
        .item-specifics {
            margin-top: 30px;
            border-top: 1px solid #ddd;
            padding-top: 20px;
        }
        .item-specifics ul {
            list-style: none;
            padding: 0;
        }
        .item-specifics li {
            margin-bottom: 8px;
            font-size: 14px;
        }
        .item-specifics strong {
            display: inline-block;
            width: 120px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="gallery">
            <div class="main-image-container">
                <img id="mainImage" src="https://images.static-bluray.com/movies/covers/32_front.jpg" alt="Hitch Blu-ray Front Cover">
            </div>
            <div class="thumbnails">
                <img src="https://images.static-bluray.com/movies/covers/32_front.jpg" alt="Front Cover Thumbnail" onclick="changeImage('https://images.static-bluray.com/movies/covers/32_front.jpg')">
                <img src="https://images.static-bluray.com/movies/covers/32_back.jpg" alt="Back Cover Thumbnail" onclick="changeImage('https://images.static-bluray.com/movies/covers/32_back.jpg')">
            </div>
        </div>

        <div class="details">
            <h1>Hitch (Blu-ray, 2005)</h1>
            <div class="condition">Condition: <strong>Very Good</strong></div>
            
            <div class="price">US $6.99</div>
            
            <button class="btn-buy">Buy It Now</button>
            
            <div class="item-specifics">
                <h3>Item specifics</h3>
                <ul>
                    <li><strong>Format:</strong> Blu-ray</li>
                    <li><strong>Release Year:</strong> 2005</li>
                    <li><strong>Release Date:</strong> June 20, 2006</li>
                    <li><strong>Movie/TV Title:</strong> Hitch</li>
                    <li><strong>Studio:</strong> Sony Pictures</li>
                    <li><strong>Genre:</strong> Comedy / Romance</li>
                </ul>
            </div>
        </div>
    </div>

    <script>
        function changeImage(imageUrl) {
            document.getElementById('mainImage').src = imageUrl;
        }
    </script>

</body>
</html>
