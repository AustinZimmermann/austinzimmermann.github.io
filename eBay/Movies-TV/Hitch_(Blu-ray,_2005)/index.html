<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hitch (Blu-ray, 2005) Will Smith - eBay</title>
    <link rel="stylesheet" href="style.css">
    
    <script type="application/ld+json">
    {
      "@context": "https://schema.org/",
      "@type": "Product",
      "name": "Hitch (Blu-ray, 2005)",
      "image": [
        "https://images.static-bluray.com/movies/covers/32_front.jpg",
        "https://images.static-bluray.com/movies/covers/32_back.jpg"
      ],
      "description": "Hitch on Blu-ray. Released 2006-06-20. Starring Will Smith, Eva Mendes, and Kevin James.",
      "brand": {
        "@type": "Brand",
        "name": "Sony Pictures Home Entertainment"
      },
      "releaseDate": "2006-06-20",
      "offers": {
        "@type": "Offer",
        "url": "https://www.ebay.com/itm/mock-hitch-bluray",
        "priceCurrency": "USD",
        "price": "5.99",
        "priceValidUntil": "2026-12-31",
        "itemCondition": "https://schema.org/UsedCondition",
        "availability": "https://schema.org/InStock",
        "seller": {
          "@type": "Organization",
          "name": "MockeBaySeller"
        }
      }
    }
    </script>
</head>
<body>
    <header class="site-header">
        <div class="logo">eBay</div>
        <div class="search-bar">
            <input type="text" placeholder="Search for anything">
            <button>Search</button>
        </div>
    </header>

    <main class="product-container">
        <section class="image-gallery">
            <div class="thumbnail-list">
                <img src="https://images.static-bluray.com/movies/covers/32_front.jpg" alt="Hitch Blu-ray Front Cover" class="thumb active" onclick="changeImage(this)">
                <img src="https://images.static-bluray.com/movies/covers/32_back.jpg" alt="Hitch Blu-ray Back Cover" class="thumb" onclick="changeImage(this)">
            </div>
            <div class="main-image-container">
                <img id="main-product-image" src="https://images.static-bluray.com/movies/covers/32_front.jpg" alt="Hitch Blu-ray Front Cover">
            </div>
        </section>

        <section class="product-details">
            <h1 class="product-title">Hitch (Blu-ray, 2005) Will Smith Kevin James - Very Good Condition</h1>
            <div class="product-meta">
                <p>Condition: <span class="condition-status">Very Good</span></p>
            </div>
            
            <div class="price-section">
                <div class="price">US $5.99</div>
            </div>

            <div class="action-buttons">
                <button class="btn btn-buy-now">Buy It Now</button>
                <button class="btn btn-add-cart">Add to cart</button>
                <button class="btn btn-watchlist">Add to watchlist</button>
            </div>

            <div class="shipping-info">
                <p><strong>Shipping:</strong> US $3.99 Standard Shipping.</p>
                <p><strong>Delivery:</strong> Estimated between 3-5 business days.</p>
                <p><strong>Returns:</strong> 30 day returns. Buyer pays for return shipping.</p>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
