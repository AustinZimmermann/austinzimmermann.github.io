<!DOCTYPE html>
<html lang="ru-RU">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Гарфилд | Disney+</title>
    <link rel="stylesheet" href="https://prod-static.disney-plus.net/us-east-1/disneyPlus/marketing-unified/_next/static/css/71c05eec92d88870.css">
    <style>
        body {
            background-color: #040714;
            color: #f9f9f9;
            font-family: sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        .hero-container {
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 0 5vw;
            background-image: linear-gradient(to right, rgba(4, 7, 20, 0.8) 20%, rgba(4, 7, 20, 0) 50%), 
                              url('https://disney.images.edge.bamgrid.com/ripcut-delivery/v1/variant/disney/149c7e36-ead7-431a-93cf-bbcd9813406f/scale?width=2880&format=webp');
            background-size: cover;
            background-position: center center;
        }

        .content-box {
            max-width: 600px;
            z-index: 2;
        }

        .logo-img {
            width: 100%;
            max-width: 400px;
            margin-bottom: 24px;
        }

        .meta-data {
            font-size: 14px;
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .rating {
            border: 1px solid #f9f9f9;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
        }

        .description {
            font-size: 20px;
            line-height: 1.6;
            margin-bottom: 30px;
            color: #f9f9f9;
        }

        .controls {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .btn-play {
            background-color: #f9f9f9;
            color: #000;
            padding: 0 24px;
            height: 56px;
            border-radius: 4px;
            font-weight: bold;
            display: flex;
            align-items: center;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            border: none;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-play:hover {
            background-color: rgb(198, 198, 198);
        }

        .btn-circle {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 2px solid white;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 24px;
        }

        .nav-bar {
            position: fixed;
            top: 0;
            width: 100%;
            height: 70px;
            background: linear-gradient(to bottom, rgba(4, 7, 20, 1), rgba(4, 7, 20, 0));
            display: flex;
            align-items: center;
            padding: 0 36px;
            z-index: 10;
        }

        .disney-logo {
            width: 80px;
        }
    </style>
</head>
<body>

    <nav class="nav-bar">
        <img src="https://cnbl-cdn.bamgrid.com/assets/7eccfbad29272803ee413ca20a32e54eb6a5899ef796045053f3604f8632e18d/original" class="disney-logo" alt="Disney+">
    </nav>

    <div class="hero-container">
        <div class="content-box">
            <h1 style="font-size: 72px; margin: 0; text-transform: uppercase; color: #ff9d00; text-shadow: 3px 3px #000;">Гарфилд</h1>
            
            <div class="meta-data">
                <span class="rating">0+</span>
                <span>2004</span>
                <span>•</span>
                <span>1 ч 20 мин</span>
                <span>•</span>
                <span>Семейный, Комедия</span>
            </div>

            <p class="description">
                Любимый всем миром кот, обожающий лазанью, вступает в борьбу за внимание хозяина, когда в доме появляется щенок Оди. Но когда Оди похищают, Гарфилд чувствует ответственность и отправляется на героическую миссию по спасению пса.
            </p>

            <div class="controls">
                <button class="btn-play">
                    <span style="margin-right: 10px;">▶</span> Смотреть
                </button>
                <button class="btn-play" style="background: rgba(0,0,0,0.6); color: white; border: 1px solid white;">
                    Трейлер
                </button>
                <div class="btn-circle" title="Добавить в список">+</div >
                <div class="btn-circle" title="Групповой просмотр">
                    <img src="https://cnbl-cdn.bamgrid.com/assets/5863c809-548c-4f76-96b6-38d58c8a1496/original" width="24" alt="GroupWatch">
                </div>
            </div>
        </div>
    </div>

</body>
</html>
