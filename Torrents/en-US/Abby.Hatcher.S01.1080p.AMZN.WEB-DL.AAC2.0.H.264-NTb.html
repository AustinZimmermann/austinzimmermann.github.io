<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abby.Hatcher.S01.1080p.AMZN.WEB-DL.AAC2.0.H.264-NTb | Torrent Details</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --container-bg: #262626;
            --border-color: #3d3d3d;
            --accent-color: #00aa66;
            --accent-hover: #00cd7c;
            --text-main: #e0e0e0;
            --text-muted: #8a8a8a;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        .torrent-container {
            max-width: 900px;
            margin: 0 auto;
            background-color: var(--container-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        h2 {
            margin-top: 0;
            font-size: 1.4rem;
            color: #fff;
            word-break: break-all;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--accent-color);
        }

        .torrent-meta {
            display: flex;
            gap: 20px;
            margin: 15px 0;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .btn-download {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-download:hover {
            background-color: var(--accent-hover);
        }

        .file-list-header {
            margin-top: 25px;
            font-weight: bold;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 5px;
            display: flex;
            justify-content: space-between;
        }

        .file-list {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 500px;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            border-top: none;
            border-radius: 0 0 4px 4px;
        }

        .file-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.9rem;
            background-color: #212121;
        }

        .file-item:nth-child(even) {
            background-color: #282828;
        }

        .file-item:last-child {
            border-bottom: none;
        }

        .file-name {
            color: #4da6ff;
            text-overflow: ellipsis;
            white-space: nowrap;
            overflow: hidden;
            padding-right: 15px;
        }

        .file-size {
            color: var(--text-muted);
            min-width: 80px;
            text-align: right;
        }
    </style>
</head>
<body>

<div class="torrent-container">
    <h2 id="torrent-title">Abby.Hatcher.S01.1080p.AMZN.WEB-DL.AAC2.0.H.264-NTb</h2>
    
    <div class="torrent-meta">
        <span><strong>Category:</strong> TV / HD</span>
        <span><strong>Total Files:</strong> 26</span>
        <span><strong>Total Size:</strong> ~11.45 GB</span>
    </div>

    <button class="btn-download" onclick="downloadTorrent()">🧲 Download Torrent (26 Files)</button>

    <div class="file-list-header">
        <span>File Name</span>
        <span>Size</span>
    </div>
    <ul class="file-list" id="mkv-file-list">
        </ul>
</div>

<script>
    // Configuration pattern for the NTb scene release
    const baseName = "Abby.Hatcher.S01E";
    const extension = ".1080p.AMZN.WEB-DL.AAC2.0.H.264-NTb.mkv";
    
    // Exact file count requested
    const totalEpisodes = 26; 
    const fileListElement = document.getElementById('mkv-file-list');

    // Generate simulated file list
    for (let i = 1; i <= totalEpisodes; i++) {
        // Pads numbers with a leading zero (e.g., 01, 02, ... 26)
        const episodeNumber = String(i).padStart(2, '0');
        const fullFileName = `${baseName}${episodeNumber}${extension}`;
        
        // Simulates slightly varied file sizes around 430-460 MB typical for 1080p WEB-DL cartoons
        const randomSize = (430 + (i % 7) * 4.3).toFixed(2); 

        // Create the elements
        const li = document.createElement('li');
        li.className = 'file-item';

        const nameSpan = document.createElement('span');
        nameSpan.className = 'file-name';
        nameSpan.textContent = fullFileName;

        const sizeSpan = document.createElement('span');
        sizeSpan.className = 'file-size';
        sizeSpan.textContent = `${randomSize} MB`;

        li.appendChild(nameSpan);
        li.appendChild(sizeSpan);
        fileListElement.appendChild(li);
    }

    // Torrent client trigger mock
    function downloadTorrent() {
        const torrentName = document.getElementById('torrent-title').textContent;
        alert(`Opening magnet link for: \n${torrentName}\n\nAll 26 MKV files have been added to your download queue.`);
    }
</script>

</body>
</html>
