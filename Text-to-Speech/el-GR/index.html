<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greek Text-to-Speech AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="tts-container">
        <h2>Εφαρμογή Κειμένου σε Ομιλία (TTS)</h2>
        <p class="subtitle">Μετατρέψτε το ελληνικό κείμενο σε φυσική ομιλία</p>
        
        <textarea id="text-input" placeholder="Πληκτρολογήστε ή επικολλήστε το ελληνικό κείμενο εδώ..."></textarea>
        
        <div class="controls-grid">
            <div class="control-group">
                <label for="voice-select">Επιλογή Φωνής:</label>
                <select id="voice-select">
                    <option value="">Φόρτωση διαθέσιμων φωνών...</option>
                </select>
            </div>

            <div class="control-group">
                <label for="rate-range">Ταχύτητα (<span id="rate-value">1</span>x):</label>
                <input type="range" id="rate-range" min="0.5" max="2" step="0.1" value="1">
            </div>

            <div class="control-group">
                <label for="pitch-range">Τόνος (<span id="pitch-value">1</span>):</label>
                <input type="range" id="pitch-range" min="0.5" max="1.5" step="0.1" value="1">
            </div>
        </div>

        <div class="button-group">
            <button id="btn-speak" class="btn primary">Αναπαραγωγή</button>
            <button id="btn-pause" class="btn secondary">Παύση</button>
            <button id="btn-stop" class="btn danger">Διακοπή</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
