<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-Men (2000) | Disney+</title>
    
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Movie",
      "name": "X-Men",
      "image": "https://image.tmdb.org/t/p/original/3QUVzbcNyfGe3ocWkYAT8emK8Co.jpg",
      "dateCreated": "2000-07-14",
      "director": {
        "@type": "Person",
        "name": "Bryan Singer"
      },
      "description": "Two mutants come to a private academy for their kind whose resident superhero team must oppose a terrorist organization with similar powers.",
      "genre": ["Action", "Science Fiction", "Adventure"],
      "contentRating": "PG-13",
      "duration": "PT1H44M"
    }
    </script>

    <style>
        /* Base Reset & Variables */
        :root {
            --bg-color: #040714;
            --text-primary: #f9f9f9;
            --text-secondary: #cacaca;
            --btn-hover: rgba(249, 249, 249, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Avenir', 'Helvetica Neue', Helvetica, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            overflow-x: hidden;
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px 40px;
            z-index: 100;
            background: linear-gradient(to bottom, rgba(4, 7, 20, 0.8) 0%, transparent 100%);
        }

        .disney-logo {
            width: 80px;
            cursor: pointer;
        }

        /* Hero Section & Background */
        .hero {
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        .hero-bg {
            position: absolute;
            top: 0;
            right: 0;
            width: 100%;
            height: 100vh;
            background-image: 
                linear-gradient(to right, #040714 15%, transparent 60%),
                linear-gradient(to top, #040714 5%, transparent 40%),
                url('https://image.tmdb.org/t/p/original/3QUVzbcNyfGe3ocWkYAT8emK8Co.jpg');
            background-size: cover;
            background-position: top right;
            z-index: 0;
        }

        /* Main Content Container */
        .content {
            position: relative;
            z-index: 10;
            max-width: 650px;
            padding: 0 5%;
            margin-top: 80px; /* Offset for nav */
        }

        .movie-logo {
            width: 100%;
            max-width: 350px;
            margin-bottom: 25px;
            filter: drop-shadow(0px 4px 8px rgba(0,0,0,0.8));
        }

        /* Metadata (Year, Rating, Duration, Genre) */
        .metadata {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 30px;
        }

        .rating {
            border: 1px solid var(--text-secondary);
            padding: 2px 6px;
            border-radius: 3px;
        }

        /* Action Buttons */
        .actions {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 30px;
        }

        button {
            cursor: pointer;
            border-radius: 4px;
            font-size: 15px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease-in-out;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .play-btn {
            background-color: var(--text-primary);
            color: black;
            border: none;
            padding: 12px 24px;
        }

        .play-btn:hover {
            background-color: rgba(255, 255, 255, 0.75);
        }

        .play-icon {
            width: 20px;
            height: 20px;
            margin-right: 8px;
            fill: black;
        }

        .trailer-btn {
            background-color: rgba(0, 0, 0, 0.6);
            color: var(--text-primary);
            border: 1px solid var(--text-primary);
            padding: 12px 24px;
        }

        .trailer-btn:hover {
            background-color: var(--text-primary);
            color: black;
        }

        .icon-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background-color: rgba(0, 0, 0, 0.6);
            border: 2px solid var(--text-primary);
            color: var(--text-primary);
            font-size: 24px;
            font-weight: 300;
        }

        .icon-btn:hover {
            background-color: var(--text-primary);
            color: black;
        }

        /* Description / Synopsis */
        .description {
            font-size: 16px;
            line-height: 1.6;
            color: var(--text-primary);
            font-weight: 400;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .hero-bg {
                background-image: 
                    linear-gradient(to top, #040714 30%, transparent 80%),
                    url('https://image.tmdb.org/t/p/original/3QUVzbcNyfGe3ocWkYAT8emK8Co.jpg');
                background-position: top center;
            }
            .hero {
                align-items: flex-end;
                padding-bottom: 40px;
            }
            .content {
                padding: 0 20px;
                text-align: center;
                margin-top: 0;
            }
            .movie-logo {
                max-width: 250px;
                margin: 0 auto 20px auto;
            }
            .metadata {
                justify-content: center;
            }
            .actions {
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <nav>
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/64/Disney%2B_2024.svg" alt="Disney+ Logo" class="disney-logo">
    </nav>

    <main class="hero">
        <div class="hero-bg"></div>
        
        <div class="content">
            <img src="https://image.tmdb.org/t/p/original/qkDbPsV76eU9ldQsHhjmEzjeeox.png" alt="X-Men" class="movie-logo">
            
            <div class="metadata">
                <span>2000</span>
                <span class="rating">PG-13</span>
                <span>1h 44m</span>
                <span>Science Fiction, Action</span>
            </div>

            <div class="actions">
                <button class="play-btn" id="playMovie">
                    <svg class="play-icon" viewBox="0 0 24 24">
                        <path d="M6 4l15 8-15 8z"></path>
                    </svg>
                    Play
                </button>
                <button class="trailer-btn" id="playTrailer">Trailer</button>
                <button class="icon-btn" title="Add to Watchlist">+</button>
                <button class="icon-btn" title="Group Watch">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                        <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"></path>
                    </svg>
                </button>
            </div>

            <p class="description">
                In a world where mutants (evolved super-powered humans) exist and are discriminated against, two groups form for an inevitable clash: the supremacist Brotherhood, and the pacifist X-Men.
            </p>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const playBtn = document.getElementById('playMovie');
            const trailerBtn = document.getElementById('playTrailer');

            playBtn.addEventListener('click', () => {
                // In a real app, this would route to the video player component
                alert('Starting playback for X-Men (2000)...');
            });

            trailerBtn.addEventListener('click', () => {
                alert('Opening trailer modal...');
            });
            
            // Subtle parallax effect on background
            window.addEventListener('mousemove', (e) => {
                const bg = document.querySelector('.hero-bg');
                const x = e.clientX / window.innerWidth;
                const y = e.clientY / window.innerHeight;
                bg.style.transform = `translate(-${x * 10}px, -${y * 10}px) scale(1.05)`;
            });
        });
    </script>

</body>
</html>
