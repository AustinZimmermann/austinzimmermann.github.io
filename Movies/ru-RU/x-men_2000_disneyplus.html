<!DOCTYPE html>
<html lang="ru-RU">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Смотреть «Люди Икс» | Disney+</title>
    
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Movie",
      "name": "Люди Икс (X-Men)",
      "image": "https://image.tmdb.org/t/p/original/3QUVzbcNyfGe3ocWkYAT8emK8Co.jpg",
      "description": "В мире, где рождаются мутанты со сверхчеловеческими способностями, две противоборствующие фракции борются за свое место в обществе.",
      "datePublished": "2000-07-14",
      "director": {
        "@type": "Person",
        "name": "Брайан Сингер"
      },
      "actor": [
        {
          "@type": "Person",
          "name": "Хью Джекман"
        },
        {
          "@type": "Person",
          "name": "Патрик Стюарт"
        },
        {
          "@type": "Person",
          "name": "Иэн Маккеллен"
        }
      ],
      "genre": ["Научная фантастика", "Боевик", "Приключения"],
      "duration": "PT1H44M",
      "contentRating": "12+"
    }
    </script>

    <style>
        /* Base Reset and Fonts */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Avenir', 'Helvetica Neue', Helvetica, sans-serif;
        }

        body {
            background-color: #040714; /* Disney+ Base Background */
            color: #f9f9f9;
            overflow-x: hidden;
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 20px 36px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, transparent 100%);
        }

        .logo {
            width: 80px;
        }

        .nav-links {
            display: flex;
            gap: 24px;
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 1.42px;
            text-transform: uppercase;
        }

        .nav-links a {
            color: #f9f9f9;
            text-decoration: none;
            cursor: pointer;
            position: relative;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 0;
            width: 0%;
            height: 2px;
            background-color: #f9f9f9;
            transition: width 0.3s ease;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        /* Hero Section */
        .hero {
            position: relative;
            height: 100vh;
            display: flex;
            align-items: center;
            padding: 0 calc(3.5vw + 24px);
        }

        /* The Background with Gradients to blend into the UI */
        .hero-background {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: -1;
            background-image: 
                linear-gradient(to right, #040714 5%, transparent 60%),
                linear-gradient(to top, #040714 2%, transparent 40%),
                url('https://image.tmdb.org/t/p/original/3QUVzbcNyfGe3ocWkYAT8emK8Co.jpg');
            background-size: cover;
            background-position: top center;
        }

        /* Content Overlays */
        .content {
            max-width: 650px;
            z-index: 10;
        }

        .movie-logo {
            width: 100%;
            max-width: 350px;
            margin-bottom: 24px;
            filter: drop-shadow(0px 4px 8px rgba(0,0,0,0.5));
        }

        /* Metadata Details */
        .meta {
            display: flex;
            align-items: center;
            font-size: 12px;
            font-weight: 500;
            margin-bottom: 24px;
            color: #cacaca;
            gap: 12px;
        }

        .rating-badge {
            background-color: rgba(255, 255, 255, 0.2);
            padding: 2px 6px;
            border-radius: 4px;
            color: #fff;
            font-weight: bold;
        }

        .description {
            font-size: 20px;
            line-height: 1.6;
            margin-bottom: 32px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }

        /* Buttons Section */
        .controls {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 24px;
            height: 56px;
            border-radius: 4px;
            font-size: 15px;
            font-weight: bold;
            letter-spacing: 1.5px;
            cursor: pointer;
            text-transform: uppercase;
            border: none;
            transition: all 0.2s ease;
        }

        .btn-play {
            background-color: #f9f9f9;
            color: #000;
        }

        .btn-play:hover {
            background-color: #c6c6c6;
        }

        .btn-trailer {
            background-color: rgba(0, 0, 0, 0.6);
            color: #f9f9f9;
            border: 1px solid #f9f9f9;
        }

        .btn-trailer:hover {
            background-color: #f9f9f9;
            color: #000;
        }

        .btn-icon {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 2px solid #f9f9f9;
            background-color: rgba(0, 0, 0, 0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 24px;
            transition: all 0.2s ease;
        }

        .btn-icon:hover {
            background-color: #f9f9f9;
            color: #000;
        }

        /* Toast Notification */
        #toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #1f2025;
            color: #fff;
            text-align: center;
            border-radius: 4px;
            padding: 16px;
            position: fixed;
            z-index: 1000;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%);
            font-size: 15px;
            border: 1px solid #333;
            opacity: 0;
            transition: opacity 0.5s, visibility 0.5s;
        }

        #toast.show {
            visibility: visible;
            opacity: 1;
        }
    </style>
</head>
<body>

    <nav>
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/64/Disney%2B_2024.svg" alt="Disney+ Logo" class="logo">
        <div class="nav-links">
            <a>Главная</a>
            <a>Поиск</a>
            <a>Фильмы</a>
            <a>Сериалы</a>
        </div>
    </nav>

    <div class="hero">
        <div class="hero-background"></div>
        
        <div class="content">
            <img src="https://image.tmdb.org/t/p/original/8tz8uOtAU1xfdiR2QxNyB0x7OuN.png" alt="X-Men Logo" class="movie-logo">
            
            <div class="meta">
                <span>2000</span>
                <span>•</span>
                <span>1 ч 44 мин</span>
                <span>•</span>
                <span>Фантастика, Боевик, Приключения</span>
                <span>•</span>
                <span class="rating-badge">12+</span>
            </div>

            <p class="description">
                В мире, где рождаются мутанты со сверхчеловеческими способностями, две противоборствующие фракции — под руководством профессора Чарльза Ксавьера и Магнето — борются за свое место в обществе.
            </p>

            <div class="controls">
                <button class="btn btn-play" id="playBtn">
                    <span style="margin-right: 8px;">▶</span> СМОТРЕТЬ
                </button>
                <button class="btn btn-trailer" id="trailerBtn">
                    ТРЕЙЛЕР
                </button>
                <div class="btn-icon" id="addBtn">+</div>
                <div class="btn-icon" id="groupWatchBtn">👥</div>
            </div>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        // Simple interactive scripts to simulate platform functionality
        document.addEventListener('DOMContentLoaded', () => {
            const playBtn = document.getElementById('playBtn');
            const trailerBtn = document.getElementById('trailerBtn');
            const addBtn = document.getElementById('addBtn');
            const groupWatchBtn = document.getElementById('groupWatchBtn');
            const toast = document.getElementById('toast');

            function showToast(message) {
                toast.textContent = message;
                toast.className = "show";
                setTimeout(() => {
                    toast.className = toast.className.replace("show", "");
                }, 3000);
            }

            // Play Button Event
            playBtn.addEventListener('click', () => {
                showToast("Загрузка плеера... Подготовка фильма «Люди Икс» (2000).");
            });

            // Trailer Button Event
            trailerBtn.addEventListener('click', () => {
                showToast("Воспроизведение официального трейлера...");
            });

            // Add to Watchlist Button Event
            addBtn.addEventListener('click', function() {
                if (this.textContent === "+") {
                    this.innerHTML = "✓";
                    showToast("Фильм добавлен в ваш список.");
                } else {
                    this.innerHTML = "+";
                    showToast("Фильм удален из вашего списка.");
                }
            });

            // GroupWatch Button Event
            groupWatchBtn.addEventListener('click', () => {
                showToast("Создание комнаты GroupWatch. Скопируйте ссылку для друзей!");
            });
        });
    </script>
</body>
</html>
