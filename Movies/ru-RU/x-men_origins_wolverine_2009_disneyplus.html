<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Люди Икс: Начало. Росомаха | Disney+</title>
    
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Movie",
      "name": "Люди Икс: Начало. Росомаха",
      "originalName": "X-Men Origins: Wolverine",
      "image": "https://image.tmdb.org/t/p/original/p4GzAzjlL7lXIVGvayg7zvzGTSi.jpg",
      "datePublished": "2009-04-30",
      "director": {
        "@type": "Person",
        "name": "Гэвин Худ"
      },
      "actor": [
        {
          "@type": "Person",
          "name": "Хью Джекман"
        },
        {
          "@type": "Person",
          "name": "Лив Шрайбер"
        }
      ],
      "description": "Эпическая история о прошлом Росомахи, его сложных отношениях с Виктором Кридом и зловещей программе «Оружие Икс».",
      "genre": ["Фантастика", "Боевик", "Приключения"]
    }
    </script>

    <style>
        /* Base Reset & Variables */
        :root {
            --disney-bg: #040714;
            --disney-text: #f9f9f9;
            --disney-text-muted: #cacaca;
            --btn-play-bg: #f9f9f9;
            --btn-play-text: #000;
            --btn-secondary-bg: rgba(0, 0, 0, 0.6);
            --btn-secondary-border: #f9f9f9;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Avenir', 'Helvetica Neue', Helvetica, sans-serif;
        }

        body {
            background-color: var(--disney-bg);
            color: var(--disney-text);
            overflow-x: hidden;
        }

        /* Navigation Bar */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px 40px;
            display: flex;
            align-items: center;
            z-index: 100;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
        }

        .logo {
            width: 80px;
            cursor: pointer;
        }

        .nav-links {
            display: flex;
            gap: 25px;
            margin-left: 40px;
            list-style: none;
            text-transform: uppercase;
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 1.5px;
        }

        .nav-links li {
            cursor: pointer;
            position: relative;
        }

        .nav-links li::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0%;
            height: 2px;
            background-color: white;
            transition: width 0.3s ease;
        }

        .nav-links li:hover::after {
            width: 100%;
        }

        /* Hero Section */
        .hero {
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 0 5vw;
        }

        /* Background Image with Gradients */
        .hero-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://image.tmdb.org/t/p/original/p4GzAzjlL7lXIVGvayg7zvzGTSi.jpg');
            background-size: cover;
            background-position: top center;
            z-index: -2;
        }

        .hero-vignette {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(to right, var(--disney-bg) 5%, transparent 60%),
                linear-gradient(to top, var(--disney-bg) 0%, transparent 30%);
            z-index: -1;
        }

        /* Content Area */
        .content {
            max-width: 650px;
            margin-top: 80px;
            z-index: 10;
        }

        .movie-logo {
            width: 100%;
            max-width: 350px;
            margin-bottom: 30px;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
        }

        .meta-data {
            font-size: 15px;
            color: var(--disney-text-muted);
            font-weight: 500;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .age-rating {
            border: 1px solid var(--disney-text-muted);
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 12px;
        }

        .description {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 30px;
            color: var(--disney-text);
        }

        /* Buttons */
        .controls {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px 24px;
            border-radius: 4px;
            font-size: 15px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
        }

        .btn-play {
            background-color: var(--btn-play-bg);
            color: var(--btn-play-text);
        }

        .btn-play:hover {
            background-color: rgba(249, 249, 249, 0.8);
        }

        .btn-trailer {
            background-color: var(--btn-secondary-bg);
            color: var(--disney-text);
            border: 1px solid var(--btn-secondary-border);
        }

        .btn-trailer:hover {
            background-color: var(--disney-text);
            color: var(--btn-play-text);
        }

        .btn-icon {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background-color: var(--btn-secondary-bg);
            border: 2px solid var(--btn-secondary-border);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            transition: 0.2s ease;
        }

        .btn-icon:hover {
            background-color: var(--disney-text);
            color: var(--btn-play-text);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .hero-vignette {
                background: linear-gradient(to top, var(--disney-bg) 20%, transparent 80%);
            }
            .content {
                text-align: center;
                margin: 0 auto;
                margin-top: 250px;
            }
            .controls {
                justify-content: center;
            }
            .nav-links {
                display: none; /* Hide links on mobile for simplicity */
            }
            .movie-logo {
                max-width: 250px;
            }
        }
    </style>
</head>
<body>

    <nav>
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/64/Disney%2B_2024.svg" alt="Disney+ Logo" class="logo">
        <ul class="nav-links">
            <li>Главная</li>
            <li>Поиск</li>
            <li>Фильмы</li>
            <li>Сериалы</li>
        </ul>
    </nav>

    <main class="hero">
        <div class="hero-bg"></div>
        <div class="hero-vignette"></div>

        <div class="content">
            <img src="https://image.tmdb.org/t/p/original/9rMapaE0s6ziuZt5ChPa7JOZMD4.png" alt="X-Men Origins Wolverine Logo" class="movie-logo">
            
            <div class="meta-data">
                <span>2009</span>
                <span>&bull;</span>
                <span>1 ч 47 мин</span>
                <span>&bull;</span>
                <span class="age-rating">16+</span>
                <span>&bull;</span>
                <span>Фантастика, Боевик</span>
            </div>

            <p class="description">
                Эпическая история о прошлом Росомахи, его сложных отношениях с Виктором Кридом и зловещей программе «Оружие Икс». Узнайте, как Логан обрел свой неразрушимый адамантиевый скелет.
            </p>

            <div class="controls">
                <button class="btn btn-play" id="playBtn">
                    ▶ Смотреть
                </button>
                <button class="btn btn-trailer" id="trailerBtn">
                    Трейлер
                </button>
                <button class="btn-icon" id="addBtn" title="Добавить в Избранное">
                    +
                </button>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const playBtn = document.getElementById('playBtn');
            const trailerBtn = document.getElementById('trailerBtn');
            const addBtn = document.getElementById('addBtn');

            // Play Button Action
            playBtn.addEventListener('click', () => {
                alert('🎬 Запуск фильма: Люди Икс: Начало. Росомаха...\nПожалуйста, подождите.');
            });

            // Trailer Button Action
            trailerBtn.addEventListener('click', () => {
                alert('🎞️ Воспроизведение трейлера...');
            });

            // Add to Watchlist Toggle
            let isAdded = false;
            addBtn.addEventListener('click', () => {
                isAdded = !isAdded;
                if (isAdded) {
                    addBtn.innerHTML = '✓';
                    addBtn.style.backgroundColor = '#f9f9f9';
                    addBtn.style.color = '#000';
                } else {
                    addBtn.innerHTML = '+';
                    addBtn.style.backgroundColor = 'rgba(0, 0, 0, 0.6)';
                    addBtn.style.color = '#fff';
                }
            });
        });
    </script>
</body>
</html>
