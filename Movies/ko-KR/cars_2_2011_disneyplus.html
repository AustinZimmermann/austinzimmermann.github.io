<!DOCTYPE html>
<html lang="ko-KR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카 2 | Disney+</title>
    
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Movie",
      "name": "카 2",
      "alternateName": "Cars 2",
      "image": "https://image.tmdb.org/t/p/original/robYRZk9LxJTwD7GlZCginji5k.jpg",
      "description": "세계 최고의 레이싱 자동차 라이트닝 맥퀸과 그의 가장 친한 친구 메이터는 세계 그랑프리 대회에 참가하기 위해 바다를 건넌다. 하지만 메이터가 국제적인 첩보전에 휘말리면서 챔피언을 향한 길은 험난해지는데...",
      "datePublished": "2011-07-20",
      "director": {
        "@type": "Person",
        "name": "존 라세터"
      },
      "actor": [
        {
          "@type": "Person",
          "name": "오웬 윌슨"
        },
        {
          "@type": "Person",
          "name": "래리 더 케이블 가이"
        }
      ],
      "genre": ["애니메이션", "코미디", "가족", "어드벤처"],
      "duration": "PT1H46M",
      "contentRating": "전체 관람가"
    }
    </script>

    <style>
        /* CSS 설정: 디즈니+ 스타일 테마 */
        :root {
            --bg-color: #040714;
            --text-color: #f9f9f9;
            --secondary-text: #cacaca;
            --button-hover: #c6c6c6;
            --overlay-gradient: linear-gradient(to right, #040714 15%, rgba(4, 7, 20, 0.7) 40%, rgba(4, 7, 20, 0) 100%),
                                linear-gradient(to top, #040714 0%, rgba(4, 7, 20, 0) 40%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', Helvetica, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
        }

        /* 네비게이션 바 (약식) */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 20px 40px;
            display: flex;
            align-items: center;
            z-index: 100;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0) 100%);
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 2px;
            cursor: pointer;
        }

        /* 히어로 섹션 (배경 및 영화 정보) */
        .hero {
            position: relative;
            width: 100vw;
            height: 100vh;
            min-height: 600px;
            background-image: var(--overlay-gradient), url('https://image.tmdb.org/t/p/original/robYRZk9LxJTwD7GlZCginji5k.jpg');
            background-size: cover;
            background-position: center top;
            display: flex;
            align-items: center;
            padding: 0 5vw;
        }

        .content {
            max-width: 650px;
            z-index: 10;
        }

        .title {
            font-size: 4rem;
            font-weight: 800;
            margin-bottom: 10px;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.5);
        }

        .meta {
            font-size: 14px;
            font-weight: 600;
            color: var(--secondary-text);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .meta span {
            display: inline-block;
        }

        .rating {
            border: 1px solid var(--secondary-text);
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 12px;
        }

        .genres {
            color: var(--text-color);
        }

        .synopsis {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 30px;
            color: var(--text-color);
            text-shadow: 1px 1px 4px rgba(0,0,0,0.7);
        }

        /* 버튼 컨테이너 */
        .controls {
            display: flex;
            gap: 15px;
        }

        button {
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s ease-in-out;
        }

        .btn-play {
            background-color: var(--text-color);
            color: black;
        }

        .btn-play:hover {
            background-color: var(--button-hover);
        }

        .btn-trailer {
            background-color: rgba(0, 0, 0, 0.5);
            color: var(--text-color);
            border: 1px solid var(--text-color);
        }

        .btn-trailer:hover {
            background-color: var(--text-color);
            color: black;
        }

        /* 하단 탭 (상세 정보 등) */
        .tabs {
            padding: 40px 5vw;
        }

        .tab-titles {
            display: flex;
            gap: 40px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
            margin-bottom: 30px;
        }

        .tab-title {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--secondary-text);
            padding-bottom: 15px;
            cursor: pointer;
            text-transform: uppercase;
        }

        .tab-title.active {
            color: var(--text-color);
            border-bottom: 3px solid var(--text-color);
        }

        .tab-content p {
            line-height: 1.8;
            color: var(--secondary-text);
        }

        /* 반응형 */
        @media (max-width: 768px) {
            .hero {
                background-position: center;
                align-items: flex-end;
                padding-bottom: 100px;
            }
            .title {
                font-size: 3rem;
            }
            .controls {
                flex-direction: column;
            }
            .btn-play, .btn-trailer {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Disney+</div>
    </header>

    <main>
        <section class="hero">
            <div class="content">
                <h1 class="title">카 2</h1>
                <div class="meta">
                    <span class="rating">전체 관람가</span>
                    <span>2011</span>
                    <span>1시간 46분</span>
                    <span class="genres">애니메이션, 코미디, 가족, 어드벤처</span>
                </div>
                <p class="synopsis">
                    세계 최고의 레이싱 자동차 라이트닝 맥퀸과 그의 가장 친한 친구 메이터는 세계 그랑프리 대회에 참가하기 위해 바다를 건넌다. 하지만 메이터가 국제적인 첩보전에 휘말리면서 챔피언을 향한 길은 험난해지는데...
                </p>
                <div class="controls">
                    <button class="btn-play" id="playBtn">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M8 5v14l11-7z"/>
                        </svg>
                        재생
                    </button>
                    <button class="btn-trailer" id="trailerBtn">
                        예고편
                    </button>
                </div>
            </div>
        </section>

        <section class="tabs">
            <div class="tab-titles">
                <div class="tab-title active">추천 콘텐츠</div>
                <div class="tab-title">상세 정보</div>
            </div>
            <div class="tab-content" id="tabContent">
                <p>감독: 존 라세터, 브래드 루이스<br>
                   출연: 오웬 윌슨, 래리 더 케이블 가이, 마이클 케인, 에밀리 모티머</p>
            </div>
        </section>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const playBtn = document.getElementById('playBtn');
            const trailerBtn = document.getElementById('trailerBtn');
            const tabTitles = document.querySelectorAll('.tab-title');

            // 재생 버튼 클릭 이벤트
            playBtn.addEventListener('click', () => {
                alert('디즈니+ 플레이어로 이동하여 "카 2"를 재생합니다.');
            });

            // 예고편 버튼 클릭 이벤트
            trailerBtn.addEventListener('click', () => {
                alert('예고편 팝업을 엽니다.');
            });

            // 탭 전환 이벤트 (단순 시뮬레이션)
            tabTitles.forEach(tab => {
                tab.addEventListener('click', () => {
                    tabTitles.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                });
            });
        });
    </script>
</body>
</html>
