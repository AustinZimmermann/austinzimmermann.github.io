<!DOCTYPE html>
<html lang="ko-KR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카 3: 새로운 도전 | 디즈니+</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Movie",
      "name": "카 3: 새로운 도전",
      "alternateName": "Cars 3",
      "image": "https://image.tmdb.org/t/p/original/4mlS1MitcOqdPLhxEFyk9Qwf5rr.jpg",
      "datePublished": "2017-07-13",
      "description": "전 세계 1위의 스포츠카, ‘맥퀸’. 어느 날 최첨단 기술로 무장한 ‘스톰’이 화려하게 데뷔하고, 맥퀸은 경기 도중 무리하게 속력을 내다 치명적인 사고를 당한다. 절망에 빠진 맥퀸은 실력파 트레이너 ‘크루즈’를 만나 새로운 도전을 시작하는데…",
      "genre": ["애니메이션", "가족", "코미디"],
      "director": {
        "@type": "Person",
        "name": "브라이언 피"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "7.5",
        "bestRating": "10",
        "ratingCount": "1250"
      }
    }
    </script>

    <style>
        /* CSS 스타일링 */
        :root {
            --bg-color: #040714; /* 디즈니+ 메인 배경색 */
            --text-primary: #f9f9f9;
            --text-secondary: #cacaca;
            --btn-hover: #cacaca;
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: Helvetica, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            overflow-x: hidden;
        }

        /* 내비게이션 바 모방 */
        header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px 40px;
            z-index: 100;
            display: flex;
            align-items: center;
        }

        .logo {
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: 2px;
            color: #fff;
            text-decoration: none;
        }

        /* 히어로 섹션 (배경 이미지 및 그라데이션) */
        .hero {
            position: relative;
            height: 100vh;
            display: flex;
            align-items: center;
            padding: 0 5%;
            background-image: url('https://image.tmdb.org/t/p/original/4mlS1MitcOqdPLhxEFyk9Qwf5rr.jpg');
            background-size: cover;
            background-position: top center;
        }

        /* 왼쪽과 아래쪽에 어두운 그라데이션 추가하여 텍스트 가독성 확보 */
        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to right, #040714 15%, rgba(4, 7, 20, 0.4) 60%, transparent 100%),
                        linear-gradient(to top, #040714 5%, transparent 40%);
        }

        /* 콘텐츠 영역 */
        .content {
            position: relative;
            z-index: 10;
            max-width: 650px;
            margin-left: 3%;
        }

        .movie-title {
            font-size: 3.5rem;
            font-weight: 700;
            margin: 0 0 10px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .meta-info {
            font-size: 0.95rem;
            color: var(--text-secondary);
            margin-bottom: 25px;
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .rating-badge {
            background-color: #ffcc00; /* 전체 관람가 색상 예시 */
            color: #000;
            padding: 2px 6px;
            border-radius: 3px;
            font-weight: 700;
            font-size: 0.8rem;
        }

        .synopsis {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 40px;
            color: #e0e0e0;
        }

        /* 버튼 그룹 */
        .button-group {
            display: flex;
            gap: 15px;
        }

        button {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 14px 28px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .btn-play {
            background-color: var(--text-primary);
            color: #000;
        }

        .btn-play:hover {
            background-color: var(--btn-hover);
        }

        .btn-play::before {
            content: '▶';
            margin-right: 8px;
            font-size: 1.2rem;
        }

        .btn-add {
            background-color: rgba(0, 0, 0, 0.6);
            color: var(--text-primary);
            border: 1px solid var(--text-primary);
        }

        .btn-add:hover {
            background-color: var(--text-primary);
            color: #000;
        }

        .btn-add span {
            margin-right: 8px;
            font-size: 1.4rem;
            font-weight: 300;
        }

        /* 반응형 모바일 디자인 */
        @media (max-width: 768px) {
            .movie-title { font-size: 2.5rem; }
            .hero::before {
                background: linear-gradient(to top, #040714 20%, rgba(4, 7, 20, 0.6) 60%, transparent 100%);
            }
            .content { align-self: flex-end; margin-bottom: 10vh; margin-left: 0; }
            .button-group { flex-direction: column; }
        }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">Disney+</a>
    </header>

    <main>
        <section class="hero">
            <div class="content">
                <h1 class="movie-title">카 3: 새로운 도전</h1>
                
                <div class="meta-info">
                    <span class="rating-badge">ALL</span>
                    <span>2017</span>
                    <span>1시간 42분</span>
                    <span>가족, 애니메이션, 코미디, 액션</span>
                </div>
                
                <p class="synopsis">
                    전 세계 1위의 스포츠카, ‘맥퀸’. 어느 날 최첨단 기술로 무장한 ‘스톰’이 화려하게 데뷔하고, 맥퀸은 경기 도중 무리하게 속력을 내다 치명적인 사고를 당한다. 절망에 빠진 맥퀸은 실력파 트레이너 ‘크루즈’를 만나 새로운 도전을 시작하는데…
                </p>
                
                <div class="button-group">
                    <button class="btn-play" id="playBtn">재생</button>
                    <button class="btn-add" id="addBtn"><span id="addIcon">+</span> 관심 콘텐츠</button>
                </div>
            </div>
        </section>
    </main>

    <script>
        // JavaScript 인터랙션
        document.addEventListener('DOMContentLoaded', () => {
            const playBtn = document.getElementById('playBtn');
            const addBtn = document.getElementById('addBtn');
            const addIcon = document.getElementById('addIcon');

            // 재생 버튼 클릭 이벤트
            playBtn.addEventListener('click', () => {
                alert('카 3: 새로운 도전 - 재생을 시작합니다.');
            });

            // 관심 콘텐츠 추가/제거 토글 이벤트
            addBtn.addEventListener('click', () => {
                if (addIcon.innerText === '+') {
                    addIcon.innerText = '✓';
                    alert('관심 콘텐츠에 추가되었습니다.');
                } else {
                    addIcon.innerText = '+';
                    alert('관심 콘텐츠에서 제거되었습니다.');
                }
            });
        });
    </script>
</body>
</html>
