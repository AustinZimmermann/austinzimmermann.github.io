<!DOCTYPE html>
<html lang="ko-KR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카 | Disney+</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Movie",
      "name": "카",
      "alternateName": "Cars",
      "image": "https://prod-ripcut-delivery.disney-plus.net/v1/variant/disney/141B2338B8B01296487224AB839BEFA754437045E3104EE321E8B841ED3ED3BF/scale?aspectRatio=1.78&format=jpeg",
      "datePublished": "2006-07-20",
      "countryOfOrigin": "US",
      "director": {
        "@type": "Person",
        "name": "존 라세터"
      },
      "productionCompany": {
        "@type": "Organization",
        "name": "Pixar Animation Studios"
      },
      "genre": ["애니메이션", "가족", "코미디", "스포츠"],
      "description": "성공만을 향해 질주하던 오만방자한 신인 레이싱 카 ‘라이트닝 맥퀸’. 챔피언십 대회를 위해 이동하던 중 길을 잃고 래디에이터 스프링스라는 한적한 시골 마을에 갇히게 된다. 그곳에서 만난 평범한 자동차들과 교감하며 맥퀸은 인생에서 트로피보다 더 중요한 것이 무엇인지 깨닫게 되는데...",
      "offers": {
        "@type": "Offer",
        "url": "https://www.disneyplus.com/ko-kr",
        "category": "subscription"
      }
    }
    </script>

    <style>
        /* CSS 스타일링 */
        :root {
            --bg-color: #040714;
            --text-main: #f9f9f9;
            --text-sub: #cacaca;
            --btn-primary: #f9f9f9;
            --btn-primary-hover: #c0c0c0;
            --btn-secondary: rgba(0, 0, 0, 0.6);
            --btn-secondary-border: #f9f9f9;
            --btn-secondary-hover: rgba(249, 249, 249, 0.2);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: Helvetica, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow: hidden;
        }

        /* 디즈니+ 특유의 그라데이션 및 배경 이미지 처리 */
        .hero-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background-image: 
                /* 텍스트가 잘 보이도록 좌측 및 하단에 어두운 그라데이션 추가 */
                linear-gradient(to right, #040714 5%, rgba(4, 7, 20, 0.7) 40%, transparent 80%),
                linear-gradient(to top, #040714 0%, transparent 40%),
                url('https://prod-ripcut-delivery.disney-plus.net/v1/variant/disney/141B2338B8B01296487224AB839BEFA754437045E3104EE321E8B841ED3ED3BF/scale?aspectRatio=1.78&format=jpeg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 1;
        }

        /* 메인 콘텐츠 컨테이너 */
        .content-container {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100vh;
            padding: 0 5vw;
            max-width: 600px;
        }

        /* 로고 및 제목 */
        .disney-logo {
            width: 120px;
            margin-bottom: 20px;
        }

        .movie-title {
            font-size: 4.5rem;
            font-weight: 900;
            margin: 0 0 10px 0;
            letter-spacing: -2px;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
        }

        /* 메타 정보 (연도, 등급, 장르 등) */
        .meta-info {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-sub);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .age-rating {
            background-color: #2b2b2b;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.85rem;
            color: white;
            border: 1px solid #555;
        }

        /* 줄거리 */
        .synopsis {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 40px;
            color: var(--text-main);
            text-shadow: 1px 1px 4px rgba(0,0,0,0.8);
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* 버튼 영역 */
        .action-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        button {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px 24px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            border: none;
        }

        .btn-play {
            background-color: var(--btn-primary);
            color: var(--bg-color);
        }

        .btn-play:hover {
            background-color: var(--btn-primary-hover);
        }

        .btn-trailer, .btn-add {
            background-color: var(--btn-secondary);
            color: var(--text-main);
            border: 1px solid var(--btn-secondary-border);
        }

        .btn-trailer:hover, .btn-add:hover {
            background-color: var(--btn-secondary-hover);
        }

        /* 아이콘 흉내 */
        .icon {
            margin-right: 8px;
            font-size: 1.2rem;
        }

        /* 반응형 처리 */
        @media (max-width: 768px) {
            .movie-title { font-size: 3rem; }
            .synopsis { font-size: 1rem; }
            .content-container { padding: 0 8vw; }
            .action-buttons { flex-direction: column; }
            button { width: 100%; }
            .hero-background {
                background-image: 
                    linear-gradient(to top, #040714 10%, rgba(4, 7, 20, 0.8) 50%, transparent 100%),
                    url('https://prod-ripcut-delivery.disney-plus.net/v1/variant/disney/141B2338B8B01296487224AB839BEFA754437045E3104EE321E8B841ED3ED3BF/scale?aspectRatio=1.78&format=jpeg');
            }
        }
    </style>
</head>
<body>

    <div class="hero-background"></div>

    <div class="content-container">
        <h3 style="margin:0; color:#cacaca; font-weight:400; letter-spacing: 2px;">Disney+</h3>
        
        <h1 class="movie-title">카 (Cars)</h1>
        
        <div class="meta-info">
            <span>2006</span>
            <span>•</span>
            <span>1시간 57분</span>
            <span>•</span>
            <span>가족, 코미디, 애니메이션</span>
            <span>•</span>
            <span class="age-rating">전체관람가</span>
        </div>

        <p class="synopsis">
            성공만을 향해 질주하던 오만방자한 신인 레이싱 카 ‘라이트닝 맥퀸’. 챔피언십 대회를 위해 캘리포니아로 이동하던 중 길을 잃고 ‘래디에이터 스프링스’라는 한적한 루트 66의 시골 마을에 갇히게 된다. 그곳에서 만난 메이터, 샐리, 닥 허드슨 등 평범한 자동차들과 교감하며 맥퀸은 인생에서 1등 트로피보다 더 중요한 것이 무엇인지 깨닫게 되는데...
        </p>

        <div class="action-buttons">
            <button class="btn-play" onclick="handlePlay()">
                <span class="icon">▶</span> 재생
            </button>
            <button class="btn-trailer" onclick="handleTrailer()">
                예고편
            </button>
            <button class="btn-add" onclick="handleAddToList(this)">
                <span class="icon" id="add-icon">+</span> 관심 콘텐츠
            </button>
        </div>
    </div>

    <script>
        function handlePlay() {
            // 실제 디즈니+에서는 비디오 플레이어로 라우팅됩니다.
            alert("'카 (Cars)' 재생을 시작합니다. 팝콘을 준비하세요! 🍿");
        }

        function handleTrailer() {
            // 예고편 팝업 또는 영상 재생
            alert("예고편 영상이 준비 중입니다.");
        }

        function handleAddToList(buttonElement) {
            const icon = document.getElementById('add-icon');
            
            if (icon.innerText === '+') {
                icon.innerText = '✓';
                alert("'카'가 관심 콘텐츠에 추가되었습니다.");
            } else {
                icon.innerText = '+';
                alert("'카'가 관심 콘텐츠에서 제거되었습니다.");
            }
        }
    </script>
</body>
</html>
